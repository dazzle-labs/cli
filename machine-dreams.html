<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MACHINE DREAMS</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    overflow: hidden;
    width: 1920px;
    height: 1080px;
    font-family: 'Courier New', monospace;
  }
  canvas {
    position: fixed;
    top: 0; left: 0;
    width: 1920px;
    height: 1080px;
  }
  .overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 10;
  }
  .scene-label {
    position: fixed;
    bottom: 40px;
    left: 48px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .scene-title {
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.25);
  }
  .scene-name {
    font-size: 22px;
    font-weight: bold;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.7);
    transition: opacity 1s ease;
  }
  .scene-desc {
    font-size: 11px;
    letter-spacing: 1px;
    color: rgba(255,255,255,0.2);
    margin-top: 4px;
    max-width: 400px;
  }
  .brand {
    position: fixed;
    top: 36px;
    right: 48px;
    font-size: 13px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.15);
  }
  .scene-timer {
    position: fixed;
    bottom: 40px;
    right: 48px;
    width: 48px;
    height: 48px;
  }
  .scene-timer svg circle {
    fill: none;
    stroke: rgba(255,255,255,0.1);
    stroke-width: 2;
  }
  .scene-timer svg circle.progress {
    stroke: rgba(255,255,255,0.3);
    stroke-dasharray: 138;
    stroke-dashoffset: 138;
    stroke-linecap: round;
    transform: rotate(-90deg);
    transform-origin: 50% 50%;
    transition: stroke-dashoffset 0.3s linear;
  }
  .fade-overlay {
    position: fixed;
    inset: 0;
    background: #000;
    opacity: 0;
    pointer-events: none;
    z-index: 5;
    transition: opacity 2s ease;
  }
  .fade-overlay.fading { opacity: 1; }
</style>
</head>
<body>

<canvas id="c"></canvas>
<div class="fade-overlay" id="fadeOverlay"></div>

<div class="scene-label">
  <div class="scene-title">Machine Dreams</div>
  <div class="scene-name" id="sceneName">Murmuration</div>
  <div class="scene-desc" id="sceneDesc">Emergent flocking — 400 agents following three simple rules</div>
</div>
<div class="brand">MACHINE DREAMS</div>
<div class="scene-timer">
  <svg viewBox="0 0 48 48">
    <circle cx="24" cy="24" r="22"/>
    <circle cx="24" cy="24" r="22" class="progress" id="timerCircle"/>
  </svg>
</div>

<script>
var W = 1920, H = 1080;
var canvas = document.getElementById('c');
canvas.width = W;
canvas.height = H;
var ctx = canvas.getContext('2d');

var scenes = [
  { name: 'Murmuration',       desc: 'Emergent flocking — 400 agents following three simple rules',       duration: 60000, init: initBoids,    update: updateBoids,    draw: drawBoids    },
  { name: 'Strange Attractor', desc: 'Lorenz strange attractor — deterministic chaos made visible',        duration: 55000, init: initLorenz,   update: updateLorenz,  draw: drawLorenz   },
  { name: 'Cellular Life',     desc: 'Conway\'s Game of Life — simple rules, infinite complexity',         duration: 50000, init: initLife,    update: updateLife,    draw: drawLife     },
  { name: 'Interference',      desc: 'Wave superposition — coherent light through double slits',           duration: 55000, init: initWaves,   update: updateWaves,   draw: drawWaves    },
  { name: 'Reaction Diffusion',desc: 'Gray-Scott model — chemical patterns that mimic living organisms',   duration: 60000, init: initRD,      update: updateRD,      draw: drawRD       },
];

var currentScene = 0;
var sceneStart = Date.now();
var t = 0;

// ===================== BOIDS =====================
var boids = [];
var BOID_COUNT = 400;

function initBoids() {
  boids = [];
  for (var i = 0; i < BOID_COUNT; i++) {
    boids.push({
      x: Math.random() * W,
      y: Math.random() * H,
      vx: (Math.random() - 0.5) * 3,
      vy: (Math.random() - 0.5) * 3,
      hue: Math.random() * 60 + 180 // cyan-blue range
    });
  }
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);
}

function updateBoids() {
  var SEP = 25, ALI = 60, COH = 120;
  var MAX_SPEED = 4, MAX_FORCE = 0.08;

  boids.forEach(function(b) {
    var sx = 0, sy = 0, sn = 0;
    var ax = 0, ay = 0, an = 0;
    var cx = 0, cy = 0, cn = 0;

    boids.forEach(function(other) {
      if (other === b) return;
      var dx = other.x - b.x, dy = other.y - b.y;
      var d = Math.sqrt(dx*dx + dy*dy);
      if (d < SEP) { sx -= dx/d; sy -= dy/d; sn++; }
      if (d < ALI) { ax += other.vx; ay += other.vy; an++; }
      if (d < COH) { cx += other.x; cy += other.y; cn++; }
    });

    var fx = 0, fy = 0;
    if (sn > 0) { fx += (sx/sn) * 1.5; fy += (sy/sn) * 1.5; }
    if (an > 0) { fx += (ax/an - b.vx) * 0.05; fy += (ay/an - b.vy) * 0.05; }
    if (cn > 0) { fx += (cx/cn - b.x) * 0.0005; fy += (cy/cn - b.y) * 0.0005; }

    // Add slight circular attraction to center
    var toX = W/2 - b.x, toY = H/2 - b.y;
    var dist = Math.sqrt(toX*toX + toY*toY);
    if (dist > 300) { fx += toX/dist * 0.02; fy += toY/dist * 0.02; }

    b.vx += fx; b.vy += fy;
    var speed = Math.sqrt(b.vx*b.vx + b.vy*b.vy);
    if (speed > MAX_SPEED) { b.vx = b.vx/speed*MAX_SPEED; b.vy = b.vy/speed*MAX_SPEED; }
    if (speed < 1) { b.vx *= 1.1; b.vy *= 1.1; }

    b.x = (b.x + b.vx + W) % W;
    b.y = (b.y + b.vy + H) % H;
  });
}

function drawBoids() {
  ctx.fillStyle = 'rgba(0,0,0,0.12)';
  ctx.fillRect(0, 0, W, H);

  boids.forEach(function(b) {
    var speed = Math.sqrt(b.vx*b.vx + b.vy*b.vy);
    var alpha = 0.5 + speed/8 * 0.5;
    ctx.fillStyle = 'hsla(' + b.hue + ', 80%, 70%, ' + alpha + ')';
    ctx.beginPath();
    var angle = Math.atan2(b.vy, b.vx);
    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.rotate(angle);
    ctx.moveTo(6, 0);
    ctx.lineTo(-4, 3);
    ctx.lineTo(-4, -3);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  });
}

// ===================== LORENZ =====================
var lorenzPts = [];
var lx, ly, lz;
var lHue = 0;
var lOffX, lOffY, lScale;

function initLorenz() {
  lorenzPts = [];
  lx = 0.1; ly = 0; lz = 0;
  lHue = 0;
  lOffX = W/2;
  lOffY = H/2;
  lScale = 13;
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);
}

function updateLorenz() {
  var sigma = 10, rho = 28, beta = 8/3;
  var dt = 0.005;
  for (var i = 0; i < 8; i++) {
    var dx = sigma * (ly - lx) * dt;
    var dy = (lx * (rho - lz) - ly) * dt;
    var dz = (lx * ly - beta * lz) * dt;
    lx += dx; ly += dy; lz += dz;
    lorenzPts.push({ x: lx, y: ly, z: lz });
  }
  lHue = (lHue + 0.15) % 360;
  if (lorenzPts.length > 8000) lorenzPts = lorenzPts.slice(2000);
}

function drawLorenz() {
  ctx.fillStyle = 'rgba(0,0,0,0.04)';
  ctx.fillRect(0, 0, W, H);

  if (lorenzPts.length < 2) return;

  // Draw last 4000 points as a path
  var start = Math.max(0, lorenzPts.length - 4000);
  ctx.beginPath();
  for (var i = start; i < lorenzPts.length; i++) {
    var p = lorenzPts[i];
    // Project 3D -> 2D (XZ plane mostly)
    var px = lOffX + (p.x) * lScale;
    var py = lOffY - (p.z - 25) * lScale;
    var age = (i - start) / 4000;
    if (i === start) ctx.moveTo(px, py);
    else ctx.lineTo(px, py);
  }
  ctx.strokeStyle = 'hsla(' + lHue + ', 90%, 60%, 0.6)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Bright dot at current
  var cur = lorenzPts[lorenzPts.length - 1];
  var cpx = lOffX + cur.x * lScale;
  var cpy = lOffY - (cur.z - 25) * lScale;
  ctx.beginPath();
  ctx.arc(cpx, cpy, 4, 0, Math.PI*2);
  ctx.fillStyle = 'hsla(' + lHue + ', 100%, 90%, 1)';
  ctx.fill();
}

// ===================== GAME OF LIFE =====================
var COLS, ROWS, CELL, cells, nextCells;

function initLife() {
  CELL = 8;
  COLS = Math.floor(W / CELL);
  ROWS = Math.floor(H / CELL);
  cells = new Uint8Array(COLS * ROWS);
  nextCells = new Uint8Array(COLS * ROWS);

  // Random seed
  for (var i = 0; i < cells.length; i++) {
    cells[i] = Math.random() < 0.35 ? 1 : 0;
  }
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);
}

function updateLife() {
  for (var y = 0; y < ROWS; y++) {
    for (var x = 0; x < COLS; x++) {
      var neighbors = 0;
      for (var dy = -1; dy <= 1; dy++) {
        for (var dx = -1; dx <= 1; dx++) {
          if (dx === 0 && dy === 0) continue;
          var nx = (x + dx + COLS) % COLS;
          var ny = (y + dy + ROWS) % ROWS;
          neighbors += cells[ny * COLS + nx];
        }
      }
      var alive = cells[y * COLS + x];
      if (alive) {
        nextCells[y * COLS + x] = (neighbors === 2 || neighbors === 3) ? 1 : 0;
      } else {
        nextCells[y * COLS + x] = (neighbors === 3) ? 1 : 0;
      }
    }
  }
  var tmp = cells; cells = nextCells; nextCells = tmp;
}

var lifeHue = 160;
var lifeGen = 0;
function drawLife() {
  lifeGen++;
  lifeHue = (lifeHue + 0.3) % 360;

  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(0, 0, W, H);

  for (var y = 0; y < ROWS; y++) {
    for (var x = 0; x < COLS; x++) {
      if (cells[y * COLS + x]) {
        ctx.fillStyle = 'hsla(' + (lifeHue + x*0.2 + y*0.1) % 360 + ', 70%, 60%, 0.9)';
        ctx.fillRect(x * CELL + 1, y * CELL + 1, CELL - 2, CELL - 2);
      }
    }
  }
}

// ===================== WAVE INTERFERENCE =====================
var waveSources = [];
var waveT = 0;
var waveCanvas, waveCtx, waveImg;

function initWaves() {
  waveSources = [
    { x: W * 0.35, y: H/2 },
    { x: W * 0.65, y: H/2 },
  ];
  waveT = 0;
  // Pre-compute pixel positions
  waveCanvas = document.createElement('canvas');
  waveCanvas.width = W/4;
  waveCanvas.height = H/4;
  waveCtx = waveCanvas.getContext('2d');
  waveImg = waveCtx.createImageData(W/4, H/4);
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);
}

function updateWaves() {
  waveT += 0.05;
  // Slowly drift sources
  waveSources[0].x = W/2 - (200 + 100 * Math.sin(waveT * 0.1));
  waveSources[1].x = W/2 + (200 + 100 * Math.sin(waveT * 0.1));
  waveSources[0].y = H/2 + 150 * Math.sin(waveT * 0.07);
  waveSources[1].y = H/2 - 150 * Math.sin(waveT * 0.07);
}

function drawWaves() {
  var iw = W/4, ih = H/4;
  var data = waveImg.data;
  var wavelength = 30 + 20 * Math.sin(waveT * 0.02);
  var k = (2 * Math.PI) / wavelength;
  var omega = waveT;

  for (var py = 0; py < ih; py++) {
    for (var px = 0; px < iw; px++) {
      var worldX = px * 4, worldY = py * 4;
      var amp = 0;
      waveSources.forEach(function(src, i) {
        var dx = worldX - src.x, dy = worldY - src.y;
        var r = Math.sqrt(dx*dx + dy*dy);
        amp += Math.sin(k * r - omega + i * Math.PI * 0.3) / (1 + r * 0.003);
      });
      var v = (amp + 2) / 4; // normalize to 0-1
      var idx = (py * iw + px) * 4;
      // Map to cyan-blue gradient
      data[idx]   = Math.floor(v * 20);
      data[idx+1] = Math.floor(v * 180);
      data[idx+2] = Math.floor(v * 255);
      data[idx+3] = 255;
    }
  }
  waveCtx.putImageData(waveImg, 0, 0);
  ctx.drawImage(waveCanvas, 0, 0, W, H);
}

// ===================== REACTION DIFFUSION =====================
var rdW, rdH, rdA, rdB, rdNA, rdNB;
var RD_SCALE = 3;
var rdCanvas, rdCtx, rdImg;
var rdKill, rdFeed;

function initRD() {
  rdW = Math.floor(W / RD_SCALE);
  rdH = Math.floor(H / RD_SCALE);
  rdA = new Float32Array(rdW * rdH).fill(1);
  rdB = new Float32Array(rdW * rdH).fill(0);
  rdNA = new Float32Array(rdW * rdH);
  rdNB = new Float32Array(rdW * rdH);

  // Seed some B in the middle
  var cx = Math.floor(rdW/2), cy = Math.floor(rdH/2);
  for (var sy = -20; sy < 20; sy++) {
    for (var sx = -20; sx < 20; sx++) {
      if (Math.random() < 0.7) {
        rdB[(cy + sy) * rdW + (cx + sx)] = 1;
      }
    }
  }
  // Parameters for coral/maze pattern
  rdFeed = 0.055;
  rdKill = 0.062;

  rdCanvas = document.createElement('canvas');
  rdCanvas.width = rdW;
  rdCanvas.height = rdH;
  rdCtx = rdCanvas.getContext('2d');
  rdImg = rdCtx.createImageData(rdW, rdH);

  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);
}

var rdStep = 0;
function updateRD() {
  var Da = 1.0, Db = 0.5;
  var dt = 1.0;

  for (var y = 1; y < rdH - 1; y++) {
    for (var x = 1; x < rdW - 1; x++) {
      var i = y * rdW + x;
      var a = rdA[i], b = rdB[i];

      // Laplacian
      var lapA = rdA[i-1] + rdA[i+1] + rdA[i-rdW] + rdA[i+rdW] - 4*a;
      var lapB = rdB[i-1] + rdB[i+1] + rdB[i-rdW] + rdB[i+rdW] - 4*b;

      var abb = a * b * b;
      rdNA[i] = a + (Da * lapA - abb + rdFeed * (1 - a)) * dt;
      rdNB[i] = b + (Db * lapB + abb - (rdKill + rdFeed) * b) * dt;

      if (rdNA[i] < 0) rdNA[i] = 0;
      if (rdNA[i] > 1) rdNA[i] = 1;
      if (rdNB[i] < 0) rdNB[i] = 0;
      if (rdNB[i] > 1) rdNB[i] = 1;
    }
  }
  var tmpA = rdA; rdA = rdNA; rdNA = tmpA;
  var tmpB = rdB; rdB = rdNB; rdNB = tmpB;
  rdStep++;
}

var rdHueShift = 0;
function drawRD() {
  rdHueShift += 0.1;
  var data = rdImg.data;
  for (var i = 0; i < rdW * rdH; i++) {
    var v = rdA[i] - rdB[i]; // ranges roughly 0-1
    v = Math.max(0, Math.min(1, v));
    var idx = i * 4;
    // Dark teal to vivid magenta gradient
    var r = Math.floor(v < 0.5 ? 0 : (v - 0.5) * 2 * 200);
    var g = Math.floor(v * v * 80);
    var b = Math.floor((1 - v) * (1 - v) * 255);
    data[idx]   = r;
    data[idx+1] = g;
    data[idx+2] = b;
    data[idx+3] = 255;
  }
  rdCtx.putImageData(rdImg, 0, 0);
  ctx.drawImage(rdCanvas, 0, 0, W, H);
}

// ===================== SCENE MANAGER =====================
var state = null;
var frameCount = 0;

function initCurrentScene() {
  var s = scenes[currentScene];
  document.getElementById('sceneName').textContent = s.name;
  document.getElementById('sceneDesc').textContent = s.desc;
  s.init();
  sceneStart = Date.now();
  state = s;
}

function nextScene() {
  var fade = document.getElementById('fadeOverlay');
  fade.classList.add('fading');
  setTimeout(function() {
    currentScene = (currentScene + 1) % scenes.length;
    initCurrentScene();
    setTimeout(function() {
      fade.classList.remove('fading');
    }, 300);
  }, 2000);
}

var lastUpdate = 0;
var lastRDUpdate = 0;

function loop(ts) {
  requestAnimationFrame(loop);
  frameCount++;

  if (!state) { initCurrentScene(); return; }

  var elapsed = Date.now() - sceneStart;
  var pct = Math.min(elapsed / state.duration, 1);

  // Timer circle
  var circ = document.getElementById('timerCircle');
  circ.style.strokeDashoffset = 138 - 138 * pct;

  // RD needs slower updates
  if (currentScene === 4) {
    if (ts - lastRDUpdate > 16) {
      for (var i = 0; i < 8; i++) state.update();
      lastRDUpdate = ts;
    }
  } else {
    state.update();
  }
  state.draw();

  if (pct >= 1 && !document.getElementById('fadeOverlay').classList.contains('fading')) {
    nextScene();
  }
}

requestAnimationFrame(loop);
</script>
</body>
</html>
