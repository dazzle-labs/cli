syntax = "proto3";

package dazzle.internal.v1;

option go_package = "github.com/browser-streamer/control-plane/internal/gen/api/v1;apiv1internal";

// FeaturedService provides public (unauthenticated) discovery endpoints.
service FeaturedService {
  rpc GetFeatured(GetFeaturedRequest) returns (GetFeaturedResponse);
}

message GetFeaturedRequest {}

message GetFeaturedResponse {
  repeated FeaturedStream streams = 1;
}

message FeaturedStream {
  string slug = 1;
  string title = 2;
  string category = 3;
}
