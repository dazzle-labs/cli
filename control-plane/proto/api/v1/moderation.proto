syntax = "proto3";

package dazzle.internal.v1;

option go_package = "github.com/browser-streamer/control-plane/internal/gen/api/v1;apiv1internal";

service ModerationService {
  rpc GetStageOwner(GetStageOwnerRequest) returns (GetStageOwnerResponse);
  rpc DeleteStage(DeleteStageRequest) returns (DeleteStageResponse);
  rpc BanUser(BanUserRequest) returns (BanUserResponse);
}

message GetStageOwnerRequest {
  string stage_id = 1;
}

message GetStageOwnerResponse {
  string user_id = 1;
  string email = 2;
  string name = 3;
}

message DeleteStageRequest {
  string stage_id = 1;
}

message DeleteStageResponse {}

message BanUserRequest {
  string user_id = 1;
}

message BanUserResponse {}
