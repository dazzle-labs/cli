<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Dazzle — Verify</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #09090b; color: #fafafa; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .card { text-align: center; max-width: 400px; padding: 2rem; }
    .code { font-size: 2rem; font-weight: 700; letter-spacing: .15em; font-family: monospace; color: #34d399; margin: 1rem 0; }
    .sub { color: #a1a1aa; font-size: .875rem; line-height: 1.5; }
    button { background: #34d399; color: #09090b; border: none; padding: .75rem 2rem; border-radius: .5rem; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 1.5rem; }
    button:hover { background: #6ee7b7; }
    button:disabled { opacity: .5; cursor: default; }
    .success { display: none; }
    .platform { color: #d4d4d8; font-size: .875rem; margin-bottom: 1rem; }
    .error { color: #f87171; font-size: .875rem; margin-top: .75rem; display: none; }
  </style>
</head>
<body>
  <div class="card"
       id="cli-data"
       data-session-id="{{.SessionID}}"
       data-verify-code="{{.VerifyCode}}">
    <div class="verify">
      <div class="platform">Connecting {{.Platform}} — {{.Username}}</div>
      <p class="sub">Verify this code matches your terminal:</p>
      <div class="code">{{.VerifyCode}}</div>
      <button id="confirm-btn">Continue</button>
      <div class="error" id="error"></div>
    </div>
    <div class="success">
      <div style="font-size:3rem;margin-bottom:1rem">&#10003;</div>
      <h2>You're all set!</h2>
      <p class="sub">You can return to your terminal.</p>
    </div>
  </div>
  <script>
    document.getElementById('confirm-btn').addEventListener('click', async function() {
      var btn = this;
      var data = document.getElementById('cli-data').dataset;
      btn.disabled = true;
      document.querySelector('.verify').style.display = 'none';
      document.querySelector('.success').style.display = 'block';
      try {
        var r = await fetch('/auth/cli/session/' + data.sessionId + '/confirm', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ verify_code: data.verifyCode })
        });
        if (!r.ok) {
          var d = await r.json().catch(function() { return null; });
          throw new Error(d && d.error ? d.error : 'Confirmation failed');
        }
      } catch (e) {
        document.querySelector('.success').style.display = 'none';
        document.querySelector('.verify').style.display = 'block';
        btn.disabled = false;
        var el = document.getElementById('error');
        el.textContent = e.message;
        el.style.display = 'block';
      }
    });
  </script>
</body>
</html>
