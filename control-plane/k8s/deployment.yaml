apiVersion: apps/v1
kind: Deployment
metadata:
  name: session-manager
  namespace: browser-streamer
  labels:
    app: session-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: session-manager
  template:
    metadata:
      labels:
        app: session-manager
    spec:
      serviceAccountName: session-manager
      containers:
        - name: session-manager
          image: session-manager:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: POD_TOKEN
              valueFrom:
                secretKeyRef:
                  name: browserless-auth
                  key: token
            - name: CLERK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: clerk-auth
                  key: secret-key
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: encryption-key
                  key: key
            - name: DB_HOST
              value: postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: browser_streamer
            - name: DB_USER
              value: browser_streamer
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-auth
                  key: password
            - name: NAMESPACE
              value: browser-streamer
            - name: STREAMER_IMAGE
              value: browser-streamer:latest
            - name: MAX_SESSIONS
              value: "3"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
