<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; box-sizing: border-box; }
    body { width: 100vw; height: 100vh; display: grid;
           place-items: center; background: #000; }
    #score { color: #34d399; font: bold 8rem system-ui;
             transition: transform 0.2s; }
  </style>
</head>
<body>
  <div id="score">0</div>
  <script>
    // Restore from localStorage (survives restarts)
    const s = localStorage.getItem('score');
    if (s) score.textContent = s;

    // Live events from `dazzle stage event emit`
    addEventListener('score', (e) => {
      score.textContent = e.detail.points;
      localStorage.setItem('score', e.detail.points);
    });
  </script>
</body>
</html>
