<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>browser-streamer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'JetBrains Mono', monospace;
    background: #0a0a0a;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .grid {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: drift 20s linear infinite;
  }

  @keyframes drift {
    to { background-position: 40px 40px; }
  }

  .container {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 3rem;
  }

  .badge {
    display: inline-block;
    border: 1px solid #2a2a2a;
    border-radius: 4px;
    padding: 0.3rem 0.8rem;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #555;
    margin-bottom: 2rem;
  }

  h1 {
    font-size: 3.5rem;
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1.1;
    margin-bottom: 1.5rem;
  }

  h1 .highlight {
    color: #22c55e;
    text-shadow: 0 0 30px rgba(34,197,94,.25);
  }

  .meta {
    display: flex;
    gap: 2rem;
    justify-content: center;
    margin-top: 2.5rem;
    font-size: 0.75rem;
    color: #444;
  }

  .meta span {
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #22c55e;
    box-shadow: 0 0 8px rgba(34,197,94,.6);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .info {
    margin-top: 3rem;
    font-size: 0.7rem;
    color: #333;
    line-height: 1.8;
  }
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="container">
    <div class="badge">browser-streamer</div>
    <h1>Hello from <span class="highlight">Hetzner</span></h1>
    <div class="meta">
      <span><span class="dot"></span> k3s cluster</span>
      <span>chromium/cdp</span>
      <span id="host"></span>
    </div>
    <div class="info" id="info"></div>
  </div>
  <script>
    document.getElementById('host').textContent = location.hostname || 'local';
    const lines = [
      `rendered at ${new Date().toISOString()}`,
      `user-agent: ${navigator.userAgent.split(' ').slice(-2).join(' ')}`,
      `viewport: ${innerWidth}×${innerHeight}`,
    ];
    document.getElementById('info').innerHTML = lines.join('<br>');
  </script>
</body>
</html>
