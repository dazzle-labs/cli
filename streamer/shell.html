<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>@import "tailwindcss";</style>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100vw; height: 100vh; overflow: hidden; background: #000; }
  canvas { width: 100%; height: 100%; display: block; }
</style>
</head>
<body>
<div id="root"></div>
<script>
// Track all timing handles so HMR dispose can cancel them
(function() {
  const _rafs = new Set();
  const _timeouts = new Set();
  const _intervals = new Set();

  const _origRAF = window.requestAnimationFrame.bind(window);
  const _origCAF = window.cancelAnimationFrame.bind(window);
  const _origST = window.setTimeout.bind(window);
  const _origCT = window.clearTimeout.bind(window);
  const _origSI = window.setInterval.bind(window);
  const _origCI = window.clearInterval.bind(window);

  window.requestAnimationFrame = function(cb) {
    const id = _origRAF(function(t) { _rafs.delete(id); cb(t); });
    _rafs.add(id);
    return id;
  };
  window.cancelAnimationFrame = function(id) {
    _rafs.delete(id);
    _origCAF(id);
  };
  window.setTimeout = function(cb, ms, ...args) {
    const id = _origST(function() { _timeouts.delete(id); cb(...args); }, ms);
    _timeouts.add(id);
    return id;
  };
  window.clearTimeout = function(id) {
    _timeouts.delete(id);
    _origCT(id);
  };
  window.setInterval = function(cb, ms, ...args) {
    const id = _origSI(cb, ms, ...args);
    _intervals.add(id);
    return id;
  };
  window.clearInterval = function(id) {
    _intervals.delete(id);
    _origCI(id);
  };

  // Accumulated state from emit_event — persists across HMR swaps
  window.__state = window.__state || {};

  window.__hmrCleanup = function() {
    for (const id of _rafs) _origCAF(id);
    _rafs.clear();
    for (const id of _timeouts) _origCT(id);
    _timeouts.clear();
    for (const id of _intervals) _origCI(id);
    _intervals.clear();
    // If a React root is mounted, skip DOM teardown — module re-evaluation will
    // re-render via React reconciliation (no flash, state preserved when tree matches).
    // Known: React→vanilla transitions run new code before unmount in wrapUserCode;
    // this is safe in practice since vanilla scenes append to body while React owns #root.
    if (window.__reactRoot) return;
    // Vanilla JS cleanup: clear root and all user-appended DOM nodes
    const rootEl = document.getElementById('root');
    if (rootEl) rootEl.innerHTML = '';
    const body = document.body;
    for (let i = body.children.length - 1; i >= 0; i--) {
      const child = body.children[i];
      if (child.id !== 'root') body.removeChild(child);
    }
  };
})();
</script>
<script type="module" src="./prelude.js"></script>
<script type="module" src="./main.jsx"></script>
</body>
</html>
