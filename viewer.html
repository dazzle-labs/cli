<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Browser Streamer</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    video { width: 100vw; height: 100vh; display: block; }
</style>
</head>
<body>
<video id="video" autoplay muted></video>
<script>
const params = new URLSearchParams(window.location.search);
const token = params.get('token');
const session = params.get('session');

if (!token || !session) {
    document.body.style.background = '#111';
    document.body.style.color = '#eee';
    document.body.style.fontFamily = 'system-ui';
    document.body.style.padding = '40px';
    document.body.style.overflow = 'auto';
    document.body.innerHTML = '<h2>Missing required query params</h2><p style="margin-top:10px;color:#888;">Usage: <code>/?token=...&session=...</code></p>';
} else {
    const base = `${window.location.protocol}//${window.location.host}`;
    const hlsUrl = `${base}/session/${session}/hls/stream.m3u8?token=${encodeURIComponent(token)}`;
    const video = document.getElementById('video');

    if (Hls.isSupported()) {
        const hls = new Hls({
            xhrSetup: (xhr, url) => {
                if (!url.includes('token=')) {
                    const sep = url.includes('?') ? '&' : '?';
                    xhr.open('GET', url + sep + 'token=' + encodeURIComponent(token), true);
                }
            },
            liveSyncDurationCount: 3,
            liveMaxLatencyDurationCount: 6,
            maxBufferLength: 5,
            maxMaxBufferLength: 10,
            backBufferLength: 5,
            enableWorker: true,
            lowLatencyMode: true,
            startPosition: -1,
            fragLoadPolicy: {
                default: {
                    maxTimeToFirstByteMs: 5000,
                    maxLoadTimeMs: 8000,
                    timeoutRetry: { maxNumRetry: 0, retryDelayMs: 0, maxRetryDelayMs: 0 },
                    errorRetry: { maxNumRetry: 0, retryDelayMs: 0, maxRetryDelayMs: 0 }
                }
            },
        });
        hls.loadSource(hlsUrl);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(() => {}));
        hls.on(Hls.Events.ERROR, (_, data) => {
            if (data.fatal && data.type === Hls.ErrorTypes.NETWORK_ERROR) {
                hls.destroy();
                setTimeout(() => location.reload(), 2000);
            } else if (data.fatal && data.type === Hls.ErrorTypes.MEDIA_ERROR) {
                hls.recoverMediaError();
            } else if (data.details === 'fragLoadError' && hls.liveSyncPosition) {
                video.currentTime = hls.liveSyncPosition;
            }
        });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = hlsUrl;
        video.addEventListener('loadedmetadata', () => video.play().catch(() => {}));
    }
}
</script>
</body>
</html>
