version: 2

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/dazzle
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    binary: dazzle
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - format: binary
    name_template: >-
      dazzle_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "arm64" }}arm64
      {{- else }}{{ .Arch }}{{ end }}

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  use: github
  groups:
    - title: New features
      regexp: '^.*feat[\(:]'
      order: 0
    - title: Bug fixes
      regexp: '^.*fix[\(:]'
      order: 1
    - title: Other changes
      order: 999
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - 'Co-Authored-By:'
      - 'Merge pull request'
      - 'Merge branch'
