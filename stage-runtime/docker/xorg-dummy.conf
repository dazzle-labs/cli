# Xorg dummy driver config for 30Hz display.
# Chrome syncs requestAnimationFrame to the display refresh rate,
# so a 30Hz display halves rendering work vs Xvfb's uncapped 60fps.
# Used for both CPU and GPU stages — saves CPU on software-rendered
# stages and avoids wasted GPU frames on hardware-rendered stages.

Section "ServerFlags"
    Option "DontVTSwitch" "true"
    Option "AllowMouseOpenFail" "true"
    Option "PciForceNone" "true"
    Option "AutoEnableDevices" "false"
    Option "AutoAddDevices" "false"
EndSection

Section "Device"
    Identifier "dummy"
    Driver "dummy"
    VideoRam 256000
EndSection

Section "Monitor"
    Identifier "monitor"
    HorizSync   15.0-100.0
    VertRefresh 15.0-200.0
    # 1280x720 @ 30Hz (cvt 1280 720 30)
    Modeline "1280x720_30" 36.81 1280 1312 1440 1600 720 723 728 741 -HSync +VSync
EndSection

Section "Screen"
    Identifier "screen"
    Device "dummy"
    Monitor "monitor"
    DefaultDepth 24
    SubSection "Display"
        Depth 24
        Virtual 1280 720
        Modes "1280x720_30"
    EndSubSection
EndSection
