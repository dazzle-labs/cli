<!DOCTYPE html>
<html><head><style>
* { margin: 0; padding: 0; } body { width: 100vw; height: 100vh; overflow: hidden; background: #000; }
canvas { width: 100%; height: 100%; }
</style></head><body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
const gl = canvas.getContext('webgl');
if (!gl) { document.body.innerHTML = '<h1 style="color:red;padding:40px">WebGL not available</h1>'; throw 'no webgl'; }

const vsrc = `attribute vec2 a_pos; void main() { gl_Position = vec4(a_pos, 0, 1); }`;

// Medium: raymarched terrain with shadows + fog + multiple materials
const fsrc = `
precision mediump float;
uniform float u_time;
uniform vec2 u_res;

float hash(vec2 p) { return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }

float noise(vec2 p) {
  vec2 i = floor(p), f = fract(p);
  f = f * f * (3.0 - 2.0 * f);
  return mix(mix(hash(i), hash(i+vec2(1,0)), f.x),
             mix(hash(i+vec2(0,1)), hash(i+vec2(1,1)), f.x), f.y);
}

float fbm(vec2 p) {
  float v = 0.0, a = 0.5;
  mat2 rot = mat2(0.8, 0.6, -0.6, 0.8);
  for (int i = 0; i < 6; i++) { v += a * noise(p); p = rot * p * 2.0; a *= 0.5; }
  return v;
}

float terrain(vec2 p) {
  return fbm(p * 0.3) * 4.0 - 2.0 + fbm(p * 1.5) * 0.5;
}

float map(vec3 p) {
  return p.y - terrain(p.xz);
}

vec3 calcNormal(vec3 p) {
  float e = 0.01;
  return normalize(vec3(
    map(p+vec3(e,0,0)) - map(p-vec3(e,0,0)),
    map(p+vec3(0,e,0)) - map(p-vec3(0,e,0)),
    map(p+vec3(0,0,e)) - map(p-vec3(0,0,e))
  ));
}

float shadow(vec3 p, vec3 light) {
  float t = 0.1, res = 1.0;
  for (int i = 0; i < 32; i++) {
    float d = map(p + light * t);
    if (d < 0.001) return 0.1;
    res = min(res, 8.0 * d / t);
    t += d;
    if (t > 20.0) break;
  }
  return clamp(res, 0.1, 1.0);
}

void main() {
  vec2 uv = (gl_FragCoord.xy - u_res * 0.5) / u_res.y;
  float t = u_time;
  vec3 ro = vec3(t * 0.5, 3.0, t * 0.3);
  vec3 rd = normalize(vec3(uv.x, uv.y - 0.2, 0.8));

  float dist = 0.0;
  vec3 col = vec3(0.5, 0.7, 0.9); // sky
  for (int i = 0; i < 100; i++) {
    vec3 p = ro + rd * dist;
    float d = map(p);
    if (d < 0.005) {
      vec3 n = calcNormal(p);
      vec3 light = normalize(vec3(0.8, 0.5, 0.3));
      float diff = max(dot(n, light), 0.0);
      float sh = shadow(p + n * 0.02, light);

      // Material: grass/rock based on slope
      float slope = n.y;
      vec3 mat = mix(vec3(0.4, 0.35, 0.3), vec3(0.2, 0.5, 0.1), smoothstep(0.5, 0.8, slope));
      mat += fbm(p.xz * 8.0) * 0.1;

      col = mat * (diff * sh * 0.8 + 0.2);
      col = mix(col, vec3(0.5, 0.7, 0.9), 1.0 - exp(-dist * 0.03));
      break;
    }
    dist += d;
    if (dist > 80.0) break;
  }

  col = pow(col, vec3(0.4545));
  gl_FragColor = vec4(col, 1.0);
}`;

function mkShader(type, src) {
  const s = gl.createShader(type); gl.shaderSource(s, src); gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s));
  return s;
}
const prog = gl.createProgram();
gl.attachShader(prog, mkShader(gl.VERTEX_SHADER, vsrc));
gl.attachShader(prog, mkShader(gl.FRAGMENT_SHADER, fsrc));
gl.linkProgram(prog); gl.useProgram(prog);
const buf = gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
const aPos = gl.getAttribLocation(prog, 'a_pos'); gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);
const uTime = gl.getUniformLocation(prog, 'u_time');
gl.uniform2f(gl.getUniformLocation(prog, 'u_res'), canvas.width, canvas.height);
function draw(t) { gl.uniform1f(uTime, t*0.001); gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4); requestAnimationFrame(draw); }
draw(0);
</script>
</body></html>
