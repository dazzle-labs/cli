<!DOCTYPE html>
<html><head><style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

.bg {
  position: absolute; inset: 0;
  background: linear-gradient(135deg, #1a0033, #003366, #004d00);
}

/* Animated background elements to make blur work harder */
.orb {
  position: absolute;
  border-radius: 50%;
  animation: float 4s ease-in-out infinite alternate;
}
@keyframes float {
  0% { transform: translateY(0) scale(1); }
  100% { transform: translateY(-40px) scale(1.15); }
}

/* The expensive part: backdrop-filter on overlapping panels */
.panel {
  position: absolute;
  backdrop-filter: blur(20px) brightness(1.2) saturate(1.5);
  -webkit-backdrop-filter: blur(20px) brightness(1.2) saturate(1.5);
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 16px;
}

.panel-1 { top: 5%; left: 5%; width: 55%; height: 45%; animation: slide1 6s ease-in-out infinite alternate; }
.panel-2 { top: 35%; left: 30%; width: 50%; height: 45%; animation: slide2 5s ease-in-out infinite alternate; }
.panel-3 { top: 15%; left: 15%; width: 40%; height: 55%; animation: slide3 7s ease-in-out infinite alternate; }
.panel-4 { top: 50%; left: 5%; width: 45%; height: 40%; animation: slide4 4s ease-in-out infinite alternate; }

@keyframes slide1 { 0% { transform: translate(0, 0); } 100% { transform: translate(30px, 20px); } }
@keyframes slide2 { 0% { transform: translate(0, 0); } 100% { transform: translate(-20px, 15px); } }
@keyframes slide3 { 0% { transform: translate(0, 0); } 100% { transform: translate(15px, -25px); } }
@keyframes slide4 { 0% { transform: translate(0, 0); } 100% { transform: translate(-25px, -10px); } }

.text {
  position: absolute;
  color: white;
  font-family: sans-serif;
  font-size: 18px;
  padding: 30px;
  opacity: 0.9;
}
</style></head><body>
<div class="bg">
  <div class="orb" style="width:200px;height:200px;background:radial-gradient(circle,#ff006680,transparent);top:10%;left:20%;animation-delay:-1s;"></div>
  <div class="orb" style="width:300px;height:300px;background:radial-gradient(circle,#0066ff80,transparent);top:40%;left:50%;animation-delay:-2s;"></div>
  <div class="orb" style="width:250px;height:250px;background:radial-gradient(circle,#00ff6680,transparent);top:60%;left:10%;animation-delay:-0.5s;"></div>
  <div class="orb" style="width:180px;height:180px;background:radial-gradient(circle,#ffcc0080,transparent);top:20%;left:70%;animation-delay:-3s;"></div>
  <div class="orb" style="width:220px;height:220px;background:radial-gradient(circle,#ff00cc80,transparent);top:70%;left:60%;animation-delay:-1.5s;"></div>
</div>
<div class="panel panel-1"><div class="text">Panel 1 — backdrop-filter: blur(20px)</div></div>
<div class="panel panel-2"><div class="text">Panel 2 — overlapping blur regions</div></div>
<div class="panel panel-3"><div class="text">Panel 3 — browser must re-blur each frame</div></div>
<div class="panel panel-4"><div class="text">Panel 4 — stacked backdrop filters</div></div>
</body></html>
