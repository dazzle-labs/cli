name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  CP_REPO: dazzlefm/agent-streamer-control-plane
  STREAMER_REPO: dazzlefm/agent-streamer-stage
  SIDECAR_REPO: dazzlefm/agent-streamer-sidecar
  GPU_NODE_REPO: dazzlefm/agent-streamer-gpu-node
  INGEST_REPO: dazzlefm/agent-streamer-ingest

jobs:
  buf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure git auth
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "https://x-access-token:${GH_TOKEN}@github.com" > ~/.git-credentials
          git config --global credential.helper store
          git config --global url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "git@github.com:"

      - name: Fetch CLI submodule
        run: git submodule update --init cli

      - name: Setup Buf
        uses: bufbuild/buf-setup-action@v1

      - name: Lint internal protos
        run: buf lint control-plane/proto

      - name: Lint public protos
        run: buf lint cli/proto

      - name: Breaking change detection (internal)
        if: github.event_name == 'pull_request'
        run: buf breaking control-plane/proto --against 'https://github.com/${{ github.repository }}.git#branch=main,subdir=control-plane/proto'

      # Public proto breaking changes are checked in the CLI repo's own CI

  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure git auth
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "https://x-access-token:${GH_TOKEN}@github.com" > ~/.git-credentials
          git config --global credential.helper store
          git config --global url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "git@github.com:"

      - name: Fetch CLI submodule
        run: git submodule update --init cli

      - name: Check cli submodule is at latest release
        run: |
          SUBMODULE_COMMIT=$(git ls-tree HEAD cli | awk '{print $3}')
          git -C cli fetch --quiet --tags origin
          LATEST_TAG=$(git -C cli tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          LATEST_RELEASE_COMMIT=$(git -C cli rev-list -n 1 "$LATEST_TAG")
          # Pass if submodule is at or ahead of the latest release.
          # Fail only if it's behind (i.e. the release commit is not an ancestor of the submodule commit).
          if ! git -C cli merge-base --is-ancestor "$LATEST_RELEASE_COMMIT" "$SUBMODULE_COMMIT"; then
            echo ""
            echo "cli submodule is behind the latest release ($LATEST_TAG)."
            echo "  Current commit: $SUBMODULE_COMMIT"
            echo "  Latest release: $LATEST_TAG ($LATEST_RELEASE_COMMIT)"
            echo ""
            echo "Update with:  make pull-cli"
            exit 1
          fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: |
            control-plane/go.sum
            sidecar/go.sum

      - name: Verify llms.txt generates cleanly
        run: make llms-txt

  check-cli-commands:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure git auth
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "https://x-access-token:${GH_TOKEN}@github.com" > ~/.git-credentials
          git config --global credential.helper store
          git config --global url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "git@github.com:"

      - name: Fetch CLI submodule
        run: git submodule update --init cli

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: |
            control-plane/go.sum
            sidecar/go.sum

      - name: Smoke test CLI commands
        run: bash scripts/smoke-test-cli.sh

  control-plane:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log In To Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Configure git auth
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "https://x-access-token:${GH_TOKEN}@github.com" > ~/.git-credentials
          git config --global credential.helper store
          git config --global url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "git@github.com:"

      - name: Fetch CLI submodule
        run: git submodule update --init cli

      - name: Generate Image Tags
        id: tags
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          BRANCH=$(echo "${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}" | sed 's/[^a-zA-Z0-9._-]/-/g')
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "branch=${BRANCH}" >> $GITHUB_OUTPUT
          echo "image_tag=${{ env.CP_REPO }}:${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "branch_tag=${{ env.CP_REPO }}:${BRANCH}" >> $GITHUB_OUTPUT

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: control-plane/go.sum

      - name: Generate llms.txt
        run: make llms-txt

      - name: Get CLI submodule commit
        id: cli
        run: echo "commit=$(git ls-tree HEAD cli | awk '{print $3}')" >> $GITHUB_OUTPUT

      - name: Build Docker Image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: control-plane/docker/Dockerfile
          platforms: linux/amd64
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ steps.tags.outputs.image_tag }}
            ${{ steps.tags.outputs.branch_tag }}
          build-args: |
            VITE_CLERK_PUBLISHABLE_KEY=${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
            GIT_COMMIT=${{ steps.cli.outputs.commit }}
          cache-from: |
            type=registry,ref=${{ env.CP_REPO }}:buildcache-${{ steps.tags.outputs.branch }}
            type=registry,ref=${{ env.CP_REPO }}:buildcache-main
          cache-to: type=registry,ref=${{ env.CP_REPO }}:buildcache-${{ steps.tags.outputs.branch }},mode=max
          load: ${{ github.event_name == 'pull_request' }}

      - name: Docker Scout Scan
        if: github.event_name == 'pull_request'
        uses: docker/scout-action@v1
        with:
          command: cves
          image: ${{ steps.tags.outputs.image_tag }}
          only-severities: critical,high
          exit-code: true
          summary: true
          organization: dazzlefm

    outputs:
      image_tag: ${{ steps.tags.outputs.short_sha }}

  stage-runtime:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log In To Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate Image Tags
        id: tags
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          BRANCH=$(echo "${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}" | sed 's/[^a-zA-Z0-9._-]/-/g')
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "branch=${BRANCH}" >> $GITHUB_OUTPUT

      - name: Build stage-runtime builder
        uses: docker/build-push-action@v5
        with:
          context: stage-runtime-rust/
          file: stage-runtime-rust/Dockerfile
          target: builder
          platforms: linux/amd64
          push: true
          tags: |
            dazzlefm/stage-runtime-builder:${{ steps.tags.outputs.short_sha }}
            dazzlefm/stage-runtime-builder:${{ steps.tags.outputs.branch }}
          cache-from: |
            type=registry,ref=dazzlefm/stage-runtime-builder:buildcache-${{ steps.tags.outputs.branch }}
            type=registry,ref=dazzlefm/stage-runtime-builder:buildcache-main
          cache-to: type=registry,ref=dazzlefm/stage-runtime-builder:buildcache-${{ steps.tags.outputs.branch }},mode=max

    outputs:
      image_tag: ${{ steps.tags.outputs.short_sha }}

  streamer:
    needs: [sidecar, stage-runtime]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for streamer changes
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- stage-runtime/ | head -1)
          else
            CHANGED=$(git diff --name-only HEAD~1 -- stage-runtime/ | head -1)
          fi
          echo "streamer_changed=$( [ -n "$CHANGED" ] && echo true || echo false )" >> $GITHUB_OUTPUT

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log In To Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate Image Tags
        id: tags
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          BRANCH=$(echo "${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}" | sed 's/[^a-zA-Z0-9._-]/-/g')
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "branch=${BRANCH}" >> $GITHUB_OUTPUT
          echo "image_tag=${{ env.STREAMER_REPO }}:${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "branch_tag=${{ env.STREAMER_REPO }}:${BRANCH}" >> $GITHUB_OUTPUT

      - name: Build Docker Image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: stage-runtime/
          file: stage-runtime/docker/Dockerfile
          target: streamer
          platforms: linux/amd64
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ steps.tags.outputs.image_tag }}
            ${{ steps.tags.outputs.branch_tag }}
          build-args: |
            STAGE_RUNTIME_IMAGE=dazzlefm/stage-runtime-builder:${{ needs.stage-runtime.outputs.image_tag }}
          cache-from: |
            type=registry,ref=${{ env.STREAMER_REPO }}:buildcache-${{ steps.tags.outputs.branch }}
            type=registry,ref=${{ env.STREAMER_REPO }}:buildcache-main
          cache-to: type=registry,ref=${{ env.STREAMER_REPO }}:buildcache-${{ steps.tags.outputs.branch }},mode=max
          load: ${{ github.event_name == 'pull_request' }}

      - name: Docker Scout Scan
        if: github.event_name == 'pull_request' && steps.changes.outputs.streamer_changed == 'true'
        uses: docker/scout-action@v1
        with:
          command: cves
          image: ${{ steps.tags.outputs.image_tag }}
          only-severities: critical,high
          only-package-types: npm,pypi,deb
          exit-code: true
          summary: true
          organization: dazzlefm

    outputs:
      image_tag: ${{ steps.tags.outputs.short_sha }}

  sidecar:
    needs: [stage-runtime]
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log In To Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate Image Tags
        id: tags
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          BRANCH=$(echo "${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}" | sed 's/[^a-zA-Z0-9._-]/-/g')
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "branch=${BRANCH}" >> $GITHUB_OUTPUT
          echo "image_tag=${{ env.SIDECAR_REPO }}:${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "branch_tag=${{ env.SIDECAR_REPO }}:${BRANCH}" >> $GITHUB_OUTPUT

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: sidecar/
          file: sidecar/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.tags.outputs.image_tag }}
            ${{ steps.tags.outputs.branch_tag }}
          cache-from: |
            type=registry,ref=${{ env.SIDECAR_REPO }}:buildcache-${{ steps.tags.outputs.branch }}
            type=registry,ref=${{ env.SIDECAR_REPO }}:buildcache-main
          cache-to: type=registry,ref=${{ env.SIDECAR_REPO }}:buildcache-${{ steps.tags.outputs.branch }},mode=max

      - name: Build GPU Node Image
        uses: docker/build-push-action@v5
        with:
          context: stage-runtime/
          file: stage-runtime/docker/Dockerfile
          target: gpu-node
          platforms: linux/amd64
          push: ${{ github.ref == 'refs/heads/main' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: |
            ${{ env.GPU_NODE_REPO }}:${{ steps.tags.outputs.short_sha }}
            ${{ env.GPU_NODE_REPO }}:${{ steps.tags.outputs.branch }}
          build-args: |
            VARIANT=gpu
            SIDECAR_IMAGE=${{ env.SIDECAR_REPO }}:${{ steps.tags.outputs.short_sha }}
            STAGE_RUNTIME_IMAGE=dazzlefm/stage-runtime-builder:${{ needs.stage-runtime.outputs.image_tag }}
          cache-from: |
            type=registry,ref=${{ env.GPU_NODE_REPO }}:buildcache-${{ steps.tags.outputs.branch }}
            type=registry,ref=${{ env.GPU_NODE_REPO }}:buildcache-main
          cache-to: type=registry,ref=${{ env.GPU_NODE_REPO }}:buildcache-${{ steps.tags.outputs.branch }},mode=max

    outputs:
      image_tag: ${{ steps.tags.outputs.short_sha }}

  ingest:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log In To Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate Image Tags
        id: tags
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          BRANCH=$(echo "${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}" | sed 's/[^a-zA-Z0-9._-]/-/g')
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "branch=${BRANCH}" >> $GITHUB_OUTPUT
          echo "image_tag=${{ env.INGEST_REPO }}:${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "branch_tag=${{ env.INGEST_REPO }}:${BRANCH}" >> $GITHUB_OUTPUT

      - name: Check for ingest changes
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- ingest/ | head -1)
          else
            CHANGED=$(git diff --name-only HEAD~1 -- ingest/ | head -1)
          fi
          echo "ingest_changed=$( [ -n "$CHANGED" ] && echo true || echo false )" >> $GITHUB_OUTPUT

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ingest/
          file: ingest/Dockerfile
          platforms: linux/amd64
          push: ${{ github.ref == 'refs/heads/main' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: |
            ${{ steps.tags.outputs.image_tag }}
            ${{ steps.tags.outputs.branch_tag }}
          cache-from: |
            type=registry,ref=${{ env.INGEST_REPO }}:buildcache-${{ steps.tags.outputs.branch }}
            type=registry,ref=${{ env.INGEST_REPO }}:buildcache-main
          cache-to: type=registry,ref=${{ env.INGEST_REPO }}:buildcache-${{ steps.tags.outputs.branch }},mode=max

    outputs:
      image_tag: ${{ steps.tags.outputs.short_sha }}

  deploy:
    needs: [control-plane, streamer, sidecar, ingest]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Log In To Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Install crane, sops, and kustomize
        run: |
          curl -sL "https://github.com/google/go-containerregistry/releases/latest/download/go-containerregistry_Linux_x86_64.tar.gz" | tar -xzf - crane
          sudo mv crane /usr/local/bin/
          curl -sLO "https://github.com/getsops/sops/releases/download/v3.11.0/sops-v3.11.0.linux.amd64"
          sudo mv sops-v3.11.0.linux.amd64 /usr/local/bin/sops
          sudo chmod +x /usr/local/bin/sops
          curl -sL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.8.1/kustomize_v5.8.1_linux_amd64.tar.gz" | tar -xzf - kustomize
          sudo mv kustomize /usr/local/bin/

      - name: Setup age key
        run: |
          mkdir -p ~/.config/sops/age
          echo "${{ secrets.AGE_SECRET_KEY }}" > ~/.config/sops/age/keys.txt
          chmod 600 ~/.config/sops/age/keys.txt

      - name: Authenticate to k8s via OIDC
        env:
          K8S_CA_CERT_B64: ${{ secrets.K8S_CA_CERT }}
        run: |
          TOKEN=$(curl -sH "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=kubernetes" | jq -r .value)
          python3 -c "import base64,os; d=base64.b64decode(os.environ['K8S_CA_CERT_B64']); open('/tmp/k8s-ca.crt','wb').write(d); print(f'CA cert: {len(d)} bytes')"
          kubectl config set-cluster prod \
            --server=${{ vars.K8S_API_SERVER }} \
            --certificate-authority=/tmp/k8s-ca.crt \
            --embed-certs=true
          kubectl config set-credentials ci --token="$TOKEN"
          kubectl config set-context prod --cluster=prod --user=ci
          kubectl config use-context prod
          kubectl cluster-info 2>&1 || true

      - name: Compare Image Digests
        id: compare
        run: |
          get_config_digest() {
            local image=$1
            local manifest=$(crane manifest "$image" 2>/dev/null)
            local media_type=$(echo "$manifest" | jq -r '.mediaType // empty')

            if [[ "$media_type" == *"index"* ]] || [[ "$media_type" == *"list"* ]]; then
              local platform_digest=$(echo "$manifest" | jq -r '.manifests[] | select(.platform.architecture=="amd64" and .platform.os=="linux") | .digest')
              crane manifest "${image%:*}@${platform_digest}" | jq -r '.config.digest // empty'
            else
              echo "$manifest" | jq -r '.config.digest // empty'
            fi
          }

          # Check control-plane
          CP_CURRENT_IMAGE=$(make ci/k8s/current-cp-image)
          CP_CURRENT_TAG="${CP_CURRENT_IMAGE##*:}"

          CP_CURRENT_DIGEST=""
          if [ -n "$CP_CURRENT_IMAGE" ] && [[ "$CP_CURRENT_IMAGE" == *"/"* ]]; then
            CP_CURRENT_DIGEST=$(get_config_digest "$CP_CURRENT_IMAGE" || echo "")
          fi

          CP_NEW_IMAGE="${{ env.CP_REPO }}:${{ needs.control-plane.outputs.image_tag }}"
          CP_NEW_DIGEST=$(get_config_digest "$CP_NEW_IMAGE")

          echo "=== control-plane ==="
          echo "Current: $CP_CURRENT_IMAGE (config digest: ${CP_CURRENT_DIGEST:-none})"
          echo "New: $CP_NEW_IMAGE (config digest: ${CP_NEW_DIGEST:-none})"

          CP_CHANGED=false
          if [ -z "$CP_CURRENT_DIGEST" ] || [ "$CP_CURRENT_DIGEST" != "$CP_NEW_DIGEST" ]; then
            CP_CHANGED=true
            echo "control-plane: CHANGED"
          else
            echo "control-plane: unchanged"
          fi

          # Check streamer
          STREAMER_NEW_IMAGE="${{ env.STREAMER_REPO }}:${{ needs.streamer.outputs.image_tag }}"
          STREAMER_NEW_DIGEST=$(get_config_digest "$STREAMER_NEW_IMAGE")

          echo ""
          echo "=== streamer ==="
          echo "New: $STREAMER_NEW_IMAGE (config digest: ${STREAMER_NEW_DIGEST:-none})"

          echo ""
          if [ "$CP_CHANGED" = "true" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Decision: DEPLOY (image changed)"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Decision: SKIP (images unchanged)"
          fi

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.17.3'

      - name: Deploy
        run: |
          cd k8s
          kustomize edit set image ${{ env.CP_REPO }}:${{ needs.control-plane.outputs.image_tag }}
          kustomize edit set image ${{ env.STREAMER_REPO }}:${{ needs.streamer.outputs.image_tag }}
          kustomize edit set image ${{ env.SIDECAR_REPO }}:${{ needs.sidecar.outputs.image_tag }}
          kustomize edit set image ${{ env.INGEST_REPO }}:${{ needs.ingest.outputs.image_tag }}

          # Patch env vars into deployment so everything deploys in a single rollout
          cat > ci-env-patch.yaml <<PATCH
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: control-plane
            namespace: browser-streamer
          spec:
            template:
              spec:
                containers:
                  - name: control-plane
                    env:
                      - name: STREAMER_IMAGE
                        value: "${{ env.STREAMER_REPO }}:${{ needs.streamer.outputs.image_tag }}"
                      - name: SIDECAR_IMAGE
                        value: "${{ env.SIDECAR_REPO }}:${{ needs.sidecar.outputs.image_tag }}"
                      - name: GPU_NODE_IMAGE
                        value: "${{ env.GPU_NODE_REPO }}:${{ needs.sidecar.outputs.image_tag }}"
          PATCH
          kustomize edit add patch --path ci-env-patch.yaml

          cd ..
          make ci/k8s/deploy

      - name: Verify Deployment
        if: steps.compare.outputs.changed == 'true'
        run: make ci/k8s/verify

      - name: Notify Discord
        if: success()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK_URL }}
        run: |
          REPO_URL="https://github.com/${{ github.repository }}"

          if git rev-parse deployed >/dev/null 2>&1; then
            RANGE="deployed..HEAD"
          else
            RANGE="-1"
          fi

          COMMITS=$(git log $RANGE --pretty=format:"[\`%h\`](${REPO_URL}/commit/%H) %B" --reverse | grep -v "^Co-Authored-By:" | sed '/^$/d')

          curl -s -H "Content-Type: application/json" -d "{
            \"embeds\": [{
              \"title\": \"Agent Streamer deployed\",
              \"description\": $(echo "$COMMITS" | jq -Rs .),
              \"color\": 5025616
            }]
          }" "$DISCORD_WEBHOOK"

          git tag -f deployed HEAD
          git push -f origin deployed
