name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  buf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bufbuild/buf-setup-action@v1
      - name: Lint
        run: buf lint proto
      - name: Breaking change detection
        if: github.event_name == 'pull_request'
        run: buf breaking proto --against 'https://github.com/${{ github.repository }}.git#branch=main,subdir=proto'

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - name: Build
        run: go build ./...
      - name: Test
        run: go test ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7

  readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - name: Regenerate README
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('server.json'))['version'])")
          make readme VERSION="$VERSION"
      - name: Check generated files are up-to-date
        run: |
          if ! git diff --exit-code README.md server.json; then
            echo ""
            echo "Generated files are stale. Run 'make readme' and commit the result."
            exit 1
          fi
      - name: Validate server.json against MCP registry schema
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - run: |
          SCHEMA_URL=$(node -e "console.log(require('./server.json')['\$schema'])")
          curl -sf "$SCHEMA_URL" -o /tmp/schema.json
          cd /tmp && pnpm init && pnpm add ajv@8.18.0 ajv-formats@3.0.1 --ignore-workspace
          node -e "
            const Ajv = require('ajv');
            const addFormats = require('ajv-formats');
            const schema = require('/tmp/schema.json');
            const data = require('$GITHUB_WORKSPACE/server.json');
            const ajv = new Ajv({ allErrors: true, strict: false });
            addFormats(ajv);
            const valid = ajv.validate(schema, data);
            if (!valid) {
              console.error('server.json schema validation failed:');
              for (const e of ajv.errors) console.error('  ' + (e.instancePath || '/') + ': ' + e.message);
              process.exit(1);
            }
            console.log('server.json validates against ' + schema['\$id']);
          "
