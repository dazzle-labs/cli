name: Restart Control Plane

on:
  workflow_dispatch:

jobs:
  restart:
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Authenticate to k8s via OIDC
        env:
          K8S_CA_CERT_B64: ${{ secrets.K8S_CA_CERT }}
        run: |
          TOKEN=$(curl -sH "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=kubernetes" | jq -r .value)
          python3 -c "import base64,os; open('/tmp/k8s-ca.crt','wb').write(base64.b64decode(os.environ['K8S_CA_CERT_B64']))"
          kubectl config set-cluster prod \
            --server=${{ vars.K8S_API_SERVER }} \
            --certificate-authority=/tmp/k8s-ca.crt \
            --embed-certs=true
          kubectl config set-credentials ci --token="$TOKEN"
          kubectl config set-context prod --cluster=prod --user=ci
          kubectl config use-context prod

      - name: Restart deployment
        run: kubectl rollout restart deployment/control-plane -n browser-streamer

      - name: Wait for rollout
        run: kubectl rollout status deployment/control-plane -n browser-streamer --timeout=300s

      - name: Show recent logs
        run: |
          POD=$(kubectl get pods -n browser-streamer -l app=control-plane --sort-by=.metadata.creationTimestamp -o jsonpath='{.items[-1].metadata.name}')
          kubectl logs -n browser-streamer "$POD" --tail=50
