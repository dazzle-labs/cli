name: Restart Control Plane

on:
  workflow_dispatch:

jobs:
  restart:
    runs-on: ubuntu-latest

    steps:
      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure k3s Kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.K3S_KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Restart deployment
        run: kubectl rollout restart deployment/control-plane -n browser-streamer

      - name: Wait for rollout
        run: kubectl rollout status deployment/control-plane -n browser-streamer --timeout=300s

      - name: Show recent logs
        run: |
          POD=$(kubectl get pods -n browser-streamer -l app=control-plane --sort-by=.metadata.creationTimestamp -o jsonpath='{.items[-1].metadata.name}')
          kubectl logs -n browser-streamer "$POD" --tail=50
