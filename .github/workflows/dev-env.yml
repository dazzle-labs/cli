name: Dev Environment

on:
  # Deploy when CI completes (no polling)
  workflow_run:
    workflows: [CI]
    types: [completed]
  # Cleanup when label removed or PR closed
  pull_request:
    types: [unlabeled, closed]
    branches: [main]

env:
  CP_REPO: dazzlefm/agent-streamer-control-plane
  STREAMER_REPO: dazzlefm/agent-streamer-stage
  SIDECAR_REPO: dazzlefm/agent-streamer-sidecar
  GPU_NODE_REPO: dazzlefm/agent-streamer-gpu-node
  INGEST_REPO: dazzlefm/agent-streamer-ingest

jobs:
  # ── Resolve PR context from either event type ──
  resolve:
    runs-on: ubuntu-latest
    outputs:
      deploy: ${{ steps.decide.outputs.deploy }}
      cleanup: ${{ steps.decide.outputs.cleanup }}
      pr_number: ${{ steps.decide.outputs.pr_number }}
      namespace: ${{ steps.decide.outputs.namespace }}
      hostname: ${{ steps.decide.outputs.hostname }}
      short_sha: ${{ steps.decide.outputs.short_sha }}
    steps:
      - name: Resolve PR and decide action
        id: decide
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          EVENT="${{ github.event_name }}"

          if [ "$EVENT" = "pull_request" ]; then
            # pull_request event — only cleanup actions reach here
            PR=${{ github.event.pull_request.number }}
            ACTION="${{ github.event.action }}"
            HAS_LABEL="${{ contains(github.event.pull_request.labels.*.name, 'deploy-dev') }}"

            if [ "$ACTION" = "closed" ]; then
              echo "deploy=false" >> $GITHUB_OUTPUT
              echo "cleanup=true" >> $GITHUB_OUTPUT
            elif [ "$ACTION" = "unlabeled" ] && [ "$HAS_LABEL" = "false" ]; then
              echo "deploy=false" >> $GITHUB_OUTPUT
              echo "cleanup=true" >> $GITHUB_OUTPUT
            else
              echo "deploy=false" >> $GITHUB_OUTPUT
              echo "cleanup=false" >> $GITHUB_OUTPUT
            fi

            NS="dev-pr-${PR}"
            echo "pr_number=${PR}" >> $GITHUB_OUTPUT
            echo "namespace=${NS}" >> $GITHUB_OUTPUT
            echo "hostname=pr-${PR}.dev.dazzle.fm" >> $GITHUB_OUTPUT
            echo "short_sha=" >> $GITHUB_OUTPUT

          elif [ "$EVENT" = "workflow_run" ]; then
            # CI just completed — check if it was for a deploy-dev PR
            CONCLUSION="${{ github.event.workflow_run.conclusion }}"
            if [ "$CONCLUSION" != "success" ]; then
              echo "CI concluded with: $CONCLUSION — skipping deploy"
              echo "deploy=false" >> $GITHUB_OUTPUT
              echo "cleanup=false" >> $GITHUB_OUTPUT
              echo "pr_number=" >> $GITHUB_OUTPUT
              echo "namespace=" >> $GITHUB_OUTPUT
              echo "hostname=" >> $GITHUB_OUTPUT
              echo "short_sha=" >> $GITHUB_OUTPUT
              exit 0
            fi

            # Get associated PR
            BRANCH="${{ github.event.workflow_run.head_branch }}"
            HEAD_SHA="${{ github.event.workflow_run.head_sha }}"
            SHORT_SHA=$(echo "$HEAD_SHA" | cut -c1-7)

            PR_JSON=$(gh api "repos/${{ github.repository }}/pulls?head=${{ github.repository_owner }}:${BRANCH}&state=open" \
              --jq '.[0] | {number, labels: [.labels[].name]}' 2>/dev/null || echo "")

            if [ -z "$PR_JSON" ] || [ "$PR_JSON" = "null" ]; then
              echo "No open PR for branch $BRANCH — skipping"
              echo "deploy=false" >> $GITHUB_OUTPUT
              echo "cleanup=false" >> $GITHUB_OUTPUT
              echo "pr_number=" >> $GITHUB_OUTPUT
              echo "namespace=" >> $GITHUB_OUTPUT
              echo "hostname=" >> $GITHUB_OUTPUT
              echo "short_sha=" >> $GITHUB_OUTPUT
              exit 0
            fi

            PR=$(echo "$PR_JSON" | jq -r '.number')
            HAS_LABEL=$(echo "$PR_JSON" | jq -r '.labels | index("deploy-dev") != null')

            if [ "$HAS_LABEL" = "true" ]; then
              echo "deploy=true" >> $GITHUB_OUTPUT
              echo "cleanup=false" >> $GITHUB_OUTPUT
            else
              echo "deploy=false" >> $GITHUB_OUTPUT
              echo "cleanup=false" >> $GITHUB_OUTPUT
            fi

            NS="dev-pr-${PR}"
            echo "pr_number=${PR}" >> $GITHUB_OUTPUT
            echo "namespace=${NS}" >> $GITHUB_OUTPUT
            echo "hostname=pr-${PR}.dev.dazzle.fm" >> $GITHUB_OUTPUT
            echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          fi

  # ── Deploy to dev cluster ──
  deploy:
    needs: [resolve]
    if: needs.resolve.outputs.deploy == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: dev-env-pr-${{ needs.resolve.outputs.pr_number }}
      cancel-in-progress: true
    permissions:
      contents: read
      id-token: write
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@776406bce94f63e41d621b960d78ee25c8b76ede # v4

      - name: Install sops and kustomize
        run: |
          SOPS_VERSION="v3.11.0"
          SOPS_SHA256="775f1384d55decfad228e7196a3f683791914f92a473f78fc47700531c29dfef"
          curl -sLO "https://github.com/getsops/sops/releases/download/${SOPS_VERSION}/sops-${SOPS_VERSION}.linux.amd64"
          echo "${SOPS_SHA256}  sops-${SOPS_VERSION}.linux.amd64" | sha256sum -c -
          sudo mv "sops-${SOPS_VERSION}.linux.amd64" /usr/local/bin/sops
          sudo chmod +x /usr/local/bin/sops

          KUSTOMIZE_VERSION="v5.8.1"
          KUSTOMIZE_SHA256="029a7f0f4e1932c52a0476cf02a0fd855c0bb85694b82c338fc648dcb53a819d"
          curl -sLO "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2F${KUSTOMIZE_VERSION}/kustomize_${KUSTOMIZE_VERSION}_linux_amd64.tar.gz"
          echo "${KUSTOMIZE_SHA256}  kustomize_${KUSTOMIZE_VERSION}_linux_amd64.tar.gz" | sha256sum -c -
          tar -xzf "kustomize_${KUSTOMIZE_VERSION}_linux_amd64.tar.gz" kustomize
          sudo mv kustomize /usr/local/bin/
          rm -f "kustomize_${KUSTOMIZE_VERSION}_linux_amd64.tar.gz"

      - name: Setup age key
        run: |
          mkdir -p ~/.config/sops/age
          echo "${{ secrets.AGE_DEV_SECRET_KEY }}" > ~/.config/sops/age/keys.txt
          chmod 600 ~/.config/sops/age/keys.txt

      - name: Authenticate to dev cluster via OIDC
        env:
          K8S_DEV_CA_CERT_B64: ${{ secrets.K8S_DEV_CA_CERT_B64 }}
        run: |
          TOKEN=$(curl -sH "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=kubernetes" | jq -r .value)
          python3 -c "import base64,os; d=base64.b64decode(os.environ['K8S_DEV_CA_CERT_B64']); open('/tmp/k8s-ca.crt','wb').write(d); print(f'CA cert: {len(d)} bytes')"
          kubectl config set-cluster dev \
            --server=${{ vars.K8S_DEV_API_SERVER }} \
            --certificate-authority=/tmp/k8s-ca.crt \
            --embed-certs=true
          kubectl config set-credentials ci --token="$TOKEN"
          kubectl config set-context dev --cluster=dev --user=ci
          kubectl config use-context dev
          kubectl cluster-info 2>&1 || true

      - name: Create namespace
        env:
          NS: ${{ needs.resolve.outputs.namespace }}
        run: |
          kubectl create namespace "$NS" \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl label namespace "$NS" \
            pod-security.kubernetes.io/enforce=baseline \
            pod-security.kubernetes.io/warn=restricted \
            --overwrite

      - name: Apply dev secrets
        env:
          NS: ${{ needs.resolve.outputs.namespace }}
        run: |
          for secret in k8s/secrets-dev/*.yaml; do
            [ -f "$secret" ] || continue
            echo "  Applying $secret"
            sops --decrypt "$secret" \
              | sed '/^  *namespace:/d' \
              | kubectl apply -n "$NS" -f -
          done

      - name: Deploy to dev environment
        env:
          NS: ${{ needs.resolve.outputs.namespace }}
          HOST: ${{ needs.resolve.outputs.hostname }}
          SHA: ${{ needs.resolve.outputs.short_sha }}
        run: |
          cd k8s/dev

          # Set namespace and image tags (reuse SHA-tagged images from CI)
          kustomize edit set namespace "$NS"
          kustomize edit set image \
            ${{ env.CP_REPO }}:${SHA} \
            ${{ env.STREAMER_REPO }}:${SHA} \
            ${{ env.SIDECAR_REPO }}:${SHA} \
            ${{ env.INGEST_REPO }}:${SHA}

          # Replace hostname placeholder in ingress
          sed -i "s/DEV_PR_HOST/${HOST}/g" ingress.yaml
          if grep -q 'DEV_PR_HOST' ingress.yaml; then
            echo "ERROR: Failed to replace DEV_PR_HOST placeholder in ingress.yaml"
            cat ingress.yaml
            exit 1
          fi

          # Patch control-plane env vars for this PR environment
          cat > ci-env-patch.yaml <<PATCH
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: control-plane
          spec:
            template:
              spec:
                containers:
                  - name: control-plane
                    env:
                      - name: STREAMER_IMAGE
                        value: "${{ env.STREAMER_REPO }}:${SHA}"
                      - name: SIDECAR_IMAGE
                        value: "${{ env.SIDECAR_REPO }}:${SHA}"
                      - name: GPU_NODE_IMAGE
                        value: "${{ env.GPU_NODE_REPO }}:${SHA}"
                      - name: OAUTH_REDIRECT_BASE_URL
                        value: "https://${HOST}"
                      - name: NAMESPACE
                        value: "${NS}"
          PATCH
          kustomize edit add patch --path ci-env-patch.yaml

          # Build and apply
          kustomize build . | kubectl apply -f -

      - name: Wait for rollout
        env:
          NS: ${{ needs.resolve.outputs.namespace }}
        run: |
          kubectl rollout status deployment/control-plane -n "$NS" --timeout=300s
          echo ""
          echo "=== Pods ==="
          kubectl get pods -n "$NS"

      - name: Cleanup credentials
        if: always()
        run: |
          rm -f ~/.config/sops/age/keys.txt ~/.kube/config /tmp/k8s-ca.crt

      - name: Comment on PR
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ needs.resolve.outputs.pr_number }}
          HOST: ${{ needs.resolve.outputs.hostname }}
          NS: ${{ needs.resolve.outputs.namespace }}
          SHA: ${{ needs.resolve.outputs.short_sha }}
        run: |
          BODY="### Dev Environment Deployed

          | | |
          |---|---|
          | **URL** | https://${HOST} |
          | **Namespace** | \`${NS}\` |
          | **Commit** | \`${SHA}\` |

          _This environment will be torn down when the PR is closed._"

          # Find existing comment to update
          COMMENT_ID=$(gh api "repos/${{ github.repository }}/issues/${PR}/comments" \
            --jq '[.[] | select(.user.type == "Bot" and (.body | contains("Dev Environment Deployed")))][0].id // empty')

          if [ -n "$COMMENT_ID" ]; then
            gh api "repos/${{ github.repository }}/issues/comments/${COMMENT_ID}" \
              -X PATCH -f body="$BODY"
          else
            gh api "repos/${{ github.repository }}/issues/${PR}/comments" \
              -f body="$BODY"
          fi

  # ── Cleanup on unlabel or PR close ──
  cleanup:
    needs: [resolve]
    if: needs.resolve.outputs.cleanup == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: dev-env-pr-${{ needs.resolve.outputs.pr_number }}
      cancel-in-progress: true
    permissions:
      id-token: write

    steps:
      - name: Set up kubectl
        uses: azure/setup-kubectl@776406bce94f63e41d621b960d78ee25c8b76ede # v4

      - name: Authenticate to dev cluster via OIDC
        env:
          K8S_DEV_CA_CERT_B64: ${{ secrets.K8S_DEV_CA_CERT_B64 }}
        run: |
          TOKEN=$(curl -sH "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=kubernetes" | jq -r .value)
          python3 -c "import base64,os; d=base64.b64decode(os.environ['K8S_DEV_CA_CERT_B64']); open('/tmp/k8s-ca.crt','wb').write(d); print(f'CA cert: {len(d)} bytes')"
          kubectl config set-cluster dev \
            --server=${{ vars.K8S_DEV_API_SERVER }} \
            --certificate-authority=/tmp/k8s-ca.crt \
            --embed-certs=true
          kubectl config set-credentials ci --token="$TOKEN"
          kubectl config set-context dev --cluster=dev --user=ci
          kubectl config use-context dev

      - name: Delete dev environment
        env:
          NS: ${{ needs.resolve.outputs.namespace }}
        run: |
          echo "Deleting namespace ${NS}..."
          kubectl delete namespace "$NS" --ignore-not-found --timeout=120s
          echo "Cleanup complete."

      - name: Cleanup credentials
        if: always()
        run: rm -f ~/.kube/config /tmp/k8s-ca.crt
