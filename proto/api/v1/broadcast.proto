syntax = "proto3";

package dazzle.v1;

option go_package = "github.com/dazzle-labs/cli/gen/api/v1;apiv1";

import "google/protobuf/timestamp.proto";

service BroadcastService {
  rpc GetStreamInfo(GetStreamInfoRequest)         returns (GetStreamInfoResponse);
  rpc SetStreamTitle(SetStreamTitleRequest)       returns (SetStreamTitleResponse);
  rpc SetStreamCategory(SetStreamCategoryRequest) returns (SetStreamCategoryResponse);
  rpc GetChat(GetChatRequest)                     returns (GetChatResponse);
  rpc SendChat(SendChatRequest)                   returns (SendChatResponse);
}

message GetStreamInfoRequest    { string stage_id = 1; }
message GetStreamInfoResponse   { string title = 1; string category = 2; string platform = 3; }

message SetStreamTitleRequest   { string stage_id = 1; string title = 2; }
message SetStreamTitleResponse  { string title = 1; }

message SetStreamCategoryRequest  { string stage_id = 1; string category = 2; }
message SetStreamCategoryResponse { string category = 1; }

message GetChatRequest {
  string stage_id = 1;
  int32  limit    = 2;
}

message ChatMessage {
  string                    id        = 1;
  string                    author    = 2;
  string                    text      = 3;  // named 'text' not 'message' to avoid proto/Go generator ambiguity
  google.protobuf.Timestamp timestamp = 4;  // typed Timestamp for unambiguous watch-mode filtering
  string                    platform  = 5;
}

message GetChatResponse  { repeated ChatMessage messages = 1; }

message SendChatRequest  { string stage_id = 1; string text = 2; }
message SendChatResponse { string platform = 1; }
