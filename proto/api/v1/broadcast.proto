syntax = "proto3";

package dazzle.v1;

option go_package = "github.com/dazzle-labs/cli/gen/api/v1;apiv1";

import "google/protobuf/timestamp.proto";

service BroadcastService {
  // Deprecated: streaming starts automatically when a stage activates.
  // These RPCs return Unimplemented. Use stage destinations instead.
  rpc StartBroadcast(StartBroadcastRequest)       returns (StartBroadcastResponse);
  rpc StopBroadcast(StopBroadcastRequest)         returns (StopBroadcastResponse);

  rpc GetStreamInfo(GetStreamInfoRequest)         returns (GetStreamInfoResponse);
  rpc SetStreamTitle(SetStreamTitleRequest)       returns (SetStreamTitleResponse);
  rpc SetStreamCategory(SetStreamCategoryRequest) returns (SetStreamCategoryResponse);
  rpc GetChat(GetChatRequest)                     returns (GetChatResponse);
  rpc SendChat(SendChatRequest)                   returns (SendChatResponse);
}

message StartBroadcastRequest   { string stage_id = 1; } // stage_id: UUID or slug
message StartBroadcastResponse  {}

message StopBroadcastRequest    { string stage_id = 1; } // stage_id: UUID or slug
message StopBroadcastResponse   {}

message GetStreamInfoRequest    { string stage_id = 1; string destination_id = 2; } // stage_id: UUID or slug
message GetStreamInfoResponse   { string title = 1; string category = 2; string platform = 3; }

message SetStreamTitleRequest   { string stage_id = 1; string title = 2; string destination_id = 3; } // stage_id: UUID or slug
message SetStreamTitleResponse  { string title = 1; }

message SetStreamCategoryRequest  { string stage_id = 1; string category = 2; string destination_id = 3; } // stage_id: UUID or slug
message SetStreamCategoryResponse { string category = 1; }

message GetChatRequest {
  string stage_id = 1; // UUID or slug
  int32  limit    = 2;
  string destination_id = 3;
}

message ChatMessage {
  string                    id        = 1;
  string                    author    = 2;
  string                    text      = 3;
  google.protobuf.Timestamp timestamp = 4;
  string                    platform  = 5;
}

message GetChatResponse  { repeated ChatMessage messages = 1; }

message SendChatRequest  { string stage_id = 1; string text = 2; string destination_id = 3; } // stage_id: UUID or slug
message SendChatResponse { string platform = 1; }
