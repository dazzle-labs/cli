syntax = "proto3";

package dazzle.v1;

option go_package = "github.com/dazzle-labs/cli/gen/api/v1;apiv1";

service RuntimeService {
  rpc EmitEvent(EmitEventRequest) returns (EmitEventResponse);
  rpc GetLogs(GetLogsRequest) returns (GetLogsResponse);
  rpc GetStageStats(GetStageStatsRequest) returns (GetStageStatsResponse);
  rpc Screenshot(ScreenshotRequest) returns (ScreenshotResponse);
  rpc ObsCommand(ObsCommandRequest) returns (ObsCommandResponse);
  rpc SyncDiff(SyncDiffRequest) returns (SyncDiffResponse);
  rpc SyncPush(stream SyncPushRequest) returns (SyncPushResponse);
  rpc Refresh(RefreshRequest) returns (RefreshResponse);
}

message EmitEventRequest { string stage_id = 1; string event = 2; string data = 3; }
message EmitEventResponse { bool ok = 1; }

message GetLogsRequest { string stage_id = 1; int32 limit = 2; }
message LogEntry { string level = 1; string message = 2; string timestamp = 3; }
message GetLogsResponse { repeated LogEntry entries = 1; }

message ScreenshotRequest { string stage_id = 1; }
message ScreenshotResponse { bytes image = 1; }

message ObsCommandRequest { string stage_id = 1; repeated string args = 2; }
message ObsCommandResponse { string output = 1; }

message SyncDiffRequest {
  string stage_id = 1;
  map<string, string> files = 2;  // relative path → sha256
  string entry = 3;               // HTML entry point filename
}

message SyncDiffResponse {
  repeated string need = 1;    // files to upload
}

message SyncPushRequest {
  string stage_id = 1;
  bytes chunk = 2;        // tar chunk
}

message SyncPushResponse {
  int32 synced = 1;
  int32 deleted = 2;
}

message RefreshRequest {
  string stage_id = 1;
}

message RefreshResponse {
  bool ok = 1;
}

message GetStageStatsRequest { string stage_id = 1; }

message GetStageStatsResponse {
  double stage_fps = 1;                // Browser rendering FPS (from Chrome rAF timing)
  double broadcast_fps = 2;            // Encoder output FPS (from ffmpeg)
  int64 dropped_frames = 3;
  int64 dropped_frames_recent = 4;
  int64 total_bytes = 5;
  bool broadcasting = 6;
  int64 broadcast_uptime_seconds = 7;
  int64 stage_uptime_seconds = 8;
}
