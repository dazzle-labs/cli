syntax = "proto3";

package dazzle.v1;

option go_package = "github.com/dazzle-labs/cli/gen/api/v1;apiv1";

import "api/v1/stream.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/timestamp.proto";

service StageService {
  rpc CreateStage(CreateStageRequest) returns (CreateStageResponse);
  rpc ListStages(ListStagesRequest) returns (ListStagesResponse);
  rpc GetStage(GetStageRequest) returns (GetStageResponse);
  rpc DeleteStage(DeleteStageRequest) returns (DeleteStageResponse);
  rpc SetStageDestination(SetStageDestinationRequest) returns (SetStageDestinationResponse);
  rpc RemoveStageDestination(RemoveStageDestinationRequest) returns (RemoveStageDestinationResponse);
  rpc ActivateStage(ActivateStageRequest) returns (ActivateStageResponse);
  rpc DeactivateStage(DeactivateStageRequest) returns (DeactivateStageResponse);
  rpc UpdateStage(UpdateStageRequest) returns (UpdateStageResponse);
}

message Stage {
  string id = 1;
  string pod_name = 2;
  string pod_ip = 3;
  int32 direct_port = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp last_activity = 6;
  string status = 7; // inactive | starting | running | stopping
  string owner_user_id = 8;
  string name = 9;
  string destination_id = 10;             // deprecated — use destinations
  // field 11 removed (was StagePreview preview)
  StreamDestination destination = 12;     // deprecated — use destinations
  repeated string capabilities = 13;     // e.g., ["gpu"]
  string slug = 14;                       // short URL slug for /watch/{slug}
  repeated StageDestination destinations = 15;
  string watch_url = 16;
}

// StageDestination represents a streaming destination linked to a stage.
message StageDestination {
  string id = 1;                // stage_destinations row ID
  string destination_id = 2;    // FK to stream_destinations
  string name = 3;
  string platform = 4;         // "dazzle", "twitch", "youtube", "kick", "restream", "custom"
  string platform_username = 5;
  bool enabled = 6;
}

message CreateStageRequest {
  string name = 1;
  repeated string capabilities = 2;
}

message CreateStageResponse {
  Stage stage = 1;
}

message ListStagesRequest {}

message ListStagesResponse {
  repeated Stage stages = 1;
}

message GetStageRequest {
  string id = 1; // stage UUID or slug
}

message GetStageResponse {
  Stage stage = 1;
}

message DeleteStageRequest {
  string id = 1; // stage UUID or slug
}

message DeleteStageResponse {}

// SetStageDestination adds/enables a destination for a stage.
message SetStageDestinationRequest {
  string stage_id = 1; // stage UUID or slug
  string destination_id = 2;
}

message SetStageDestinationResponse {
  Stage stage = 1;
}

// RemoveStageDestination removes a destination from a stage.
message RemoveStageDestinationRequest {
  string stage_id = 1; // stage UUID or slug
  string destination_id = 2;
}

message RemoveStageDestinationResponse {
  Stage stage = 1;
}

message ActivateStageRequest {
  string id = 1; // stage UUID or slug
}

message ActivateStageResponse {
  Stage stage = 1;
}

message DeactivateStageRequest {
  string id = 1; // stage UUID or slug
}

message DeactivateStageResponse {
  Stage stage = 1;
}

message UpdateStageRequest {
  Stage stage = 1;
  google.protobuf.FieldMask update_mask = 2;
}

message UpdateStageResponse {
  Stage stage = 1;
}
