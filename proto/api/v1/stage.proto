syntax = "proto3";

package dazzle.v1;

option go_package = "github.com/dazzle-labs/cli/gen/api/v1;apiv1";

import "api/v1/stream.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/timestamp.proto";

service StageService {
  rpc CreateStage(CreateStageRequest) returns (CreateStageResponse);
  rpc ListStages(ListStagesRequest) returns (ListStagesResponse);
  rpc GetStage(GetStageRequest) returns (GetStageResponse);
  rpc DeleteStage(DeleteStageRequest) returns (DeleteStageResponse);
  rpc AttachStageDestination(AttachStageDestinationRequest) returns (AttachStageDestinationResponse);
  rpc DetachStageDestination(DetachStageDestinationRequest) returns (DetachStageDestinationResponse);
  // Deprecated: Use AttachStageDestination instead.
  rpc SetStageDestination(SetStageDestinationRequest) returns (SetStageDestinationResponse);
  // Deprecated: Use DetachStageDestination instead.
  rpc RemoveStageDestination(RemoveStageDestinationRequest) returns (RemoveStageDestinationResponse);
  rpc ActivateStage(ActivateStageRequest) returns (ActivateStageResponse);
  rpc DeactivateStage(DeactivateStageRequest) returns (DeactivateStageResponse);
  rpc UpdateStage(UpdateStageRequest) returns (UpdateStageResponse);
}

message Stage {
  string id = 1;
  string pod_name = 2;
  string pod_ip = 3;
  int32 direct_port = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp last_activity = 6;
  string status = 7; // inactive | starting | running | stopping
  string owner_user_id = 8;
  string name = 9;
  reserved 10, 11, 12;
  repeated string capabilities = 13;     // e.g., ["gpu"]
  string slug = 14;                       // short URL slug for /watch/{slug}
  repeated StreamDestination destinations = 15;
  string watch_url = 16;
}

message CreateStageRequest {
  string name = 1;
  repeated string capabilities = 2;
}

message CreateStageResponse {
  Stage stage = 1;
}

enum StageFilter {
  STAGE_FILTER_UNSPECIFIED = 0;
  STAGE_FILTER_OWNED = 1;       // Stages owned by the authenticated user (requires auth)
  STAGE_FILTER_LIVE = 2;        // Currently broadcasting (public, no auth required)
}

message ListStagesRequest {
  int32 page_size = 1;               // Max results per page (default 50, max 100)
  string page_token = 2;             // Opaque token for next page; empty for first page
  repeated StageFilter filters = 3;  // Combined with AND. Empty = OWNED (backward compat)
}

message ListStagesResponse {
  repeated Stage stages = 1;
  string next_page_token = 2;        // Empty when no more results
}

message GetStageRequest {
  string id = 1; // stage UUID or slug
}

message GetStageResponse {
  Stage stage = 1;
}

message DeleteStageRequest {
  string id = 1; // stage UUID or slug
}

message DeleteStageResponse {}

// AttachStageDestination adds/enables a destination for a stage.
message AttachStageDestinationRequest {
  string stage_id = 1; // stage UUID or slug
  string destination_id = 2;
}

message AttachStageDestinationResponse {
  Stage stage = 1;
}

// DetachStageDestination removes a destination from a stage.
message DetachStageDestinationRequest {
  string stage_id = 1; // stage UUID or slug
  string destination_id = 2;
}

message DetachStageDestinationResponse {
  Stage stage = 1;
}

// Deprecated: Use AttachStageDestinationRequest instead.
message SetStageDestinationRequest {
  string stage_id = 1;
  string destination_id = 2;
}

// Deprecated: Use AttachStageDestinationResponse instead.
message SetStageDestinationResponse {
  Stage stage = 1;
}

// Deprecated: Use DetachStageDestinationRequest instead.
message RemoveStageDestinationRequest {
  string stage_id = 1;
  string destination_id = 2;
}

// Deprecated: Use DetachStageDestinationResponse instead.
message RemoveStageDestinationResponse {
  Stage stage = 1;
}

message ActivateStageRequest {
  string id = 1; // stage UUID or slug
}

message ActivateStageResponse {
  Stage stage = 1;
}

message DeactivateStageRequest {
  string id = 1; // stage UUID or slug
}

message DeactivateStageResponse {
  Stage stage = 1;
}

message UpdateStageRequest {
  Stage stage = 1;
  google.protobuf.FieldMask update_mask = 2;
}

message UpdateStageResponse {
  Stage stage = 1;
}
