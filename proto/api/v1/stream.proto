syntax = "proto3";

package dazzle.v1;

option go_package = "github.com/dazzle-labs/cli/gen/api/v1;apiv1";

import "google/protobuf/timestamp.proto";

service RtmpDestinationService {
  rpc CreateStreamDestination(CreateStreamDestinationRequest) returns (CreateStreamDestinationResponse);
  rpc ListStreamDestinations(ListStreamDestinationsRequest) returns (ListStreamDestinationsResponse);
  rpc UpdateStreamDestination(UpdateStreamDestinationRequest) returns (UpdateStreamDestinationResponse);
  rpc DeleteStreamDestination(DeleteStreamDestinationRequest) returns (DeleteStreamDestinationResponse);
}

message StreamDestination {
  string id = 1;
  string name = 2;
  string platform = 3;
  string rtmp_url = 4;
  string stream_key = 5;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
  string platform_username = 9;
}

message CreateStreamDestinationRequest {
  string name = 1;
  string platform = 2;
  string rtmp_url = 3;
  string stream_key = 4;
  string platform_username = 5;
}

message CreateStreamDestinationResponse {
  StreamDestination destination = 1;
}

message ListStreamDestinationsRequest {
  string stage_id = 1;
}

message ListStreamDestinationsResponse {
  repeated StreamDestination destinations = 1;
  repeated string available_platforms = 2;
}

message UpdateStreamDestinationRequest {
  string id = 1;
  string name = 2;
  string platform = 3;
  string rtmp_url = 4;
  string stream_key = 5;
}

message UpdateStreamDestinationResponse {
  StreamDestination destination = 1;
}

message DeleteStreamDestinationRequest {
  string id = 1;
}

message DeleteStreamDestinationResponse {}
