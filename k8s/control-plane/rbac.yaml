apiVersion: v1
kind: ServiceAccount
metadata:
  name: control-plane
  namespace: browser-streamer
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: control-plane
  namespace: browser-streamer
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "delete", "get", "list", "watch"]
  - apiGroups: ["dazzle.fm"]
    resources: ["gpunodes", "gpunodes/status", "gpunodeclasses", "gpustages", "gpustages/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["cilium.io"]
    resources: ["ciliumnetworkpolicies"]
    verbs: ["get", "list", "create", "update", "delete"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "create", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: control-plane-crds
rules:
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: control-plane
  namespace: browser-streamer
subjects:
  - kind: ServiceAccount
    name: control-plane
    namespace: browser-streamer
roleRef:
  kind: Role
  name: control-plane
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: control-plane-crds
subjects:
  - kind: ServiceAccount
    name: control-plane
    namespace: browser-streamer
roleRef:
  kind: ClusterRole
  name: control-plane-crds
  apiGroup: rbac.authorization.k8s.io
