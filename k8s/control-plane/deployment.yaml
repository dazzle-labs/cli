apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-plane
  namespace: browser-streamer
  labels:
    app: control-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      app: control-plane
  template:
    metadata:
      labels:
        app: control-plane
    spec:
      serviceAccountName: control-plane
      imagePullSecrets:
        - name: dazzlefm-dockerhub-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: control-plane
          image: dazzlefm/agent-streamer-control-plane:main
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8080
          env:
            - name: POD_TOKEN
              valueFrom:
                secretKeyRef:
                  name: browserless-auth
                  key: token
            - name: CLERK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: clerk-auth
                  key: secret-key
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: encryption-key
                  key: key
            - name: DB_HOST
              value: postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: browser_streamer
            - name: DB_USER
              value: browser_streamer
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-auth
                  key: password
            - name: NAMESPACE
              value: browser-streamer
            - name: STREAMER_IMAGE
              value: dazzlefm/agent-streamer-stage:main
            - name: IMAGE_PULL_SECRET
              value: dazzlefm-dockerhub-secret
            - name: MAX_SESSIONS
              value: "3"
            - name: SCHEDULER_NAME
              value: scheduler-plugins-scheduler
            - name: PRIORITY_CLASS_NAME
              value: streamer-priority
            - name: TWITCH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: oauth-platform
                  key: twitch-client-id
                  optional: true
            - name: TWITCH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth-platform
                  key: twitch-client-secret
                  optional: true
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: oauth-platform
                  key: google-client-id
                  optional: true
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth-platform
                  key: google-client-secret
                  optional: true
            - name: KICK_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: oauth-platform
                  key: kick-client-id
                  optional: true
            - name: KICK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth-platform
                  key: kick-client-secret
                  optional: true
            - name: OAUTH_REDIRECT_BASE_URL
              value: "https://stream.dazzle.fm"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
