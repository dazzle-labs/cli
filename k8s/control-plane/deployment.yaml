apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-plane
  namespace: browser-streamer
  labels:
    app: control-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      app: control-plane
  template:
    metadata:
      labels:
        app: control-plane
    spec:
      serviceAccountName: control-plane
      imagePullSecrets:
        - name: dazzlefm-dockerhub-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: control-plane
          image: dazzlefm/agent-streamer-control-plane:main
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8080
          env:
            - name: POD_TOKEN
              valueFrom:
                secretKeyRef:
                  name: browserless-auth
                  key: token
            - name: CLERK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: clerk-auth
                  key: secret-key
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: encryption-key
                  key: key
            - name: DB_HOST
              value: postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: browser_streamer
            - name: DB_USER
              value: browser_streamer
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-auth
                  key: password
            - name: NAMESPACE
              value: browser-streamer
            - name: STREAMER_IMAGE
              value: dazzlefm/agent-streamer-stage:main
            - name: IMAGE_PULL_SECRET
              value: dazzlefm-dockerhub-secret
            - name: MAX_SESSIONS
              value: "3"
            - name: SCHEDULER_NAME
              value: scheduler-plugins-scheduler
            - name: PRIORITY_CLASS_NAME
              value: streamer-priority
            - name: TWITCH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: oauth-platform
                  key: twitch-client-id
                  optional: true
            - name: TWITCH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth-platform
                  key: twitch-client-secret
                  optional: true
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: oauth-platform
                  key: google-client-id
                  optional: true
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth-platform
                  key: google-client-secret
                  optional: true
            - name: KICK_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: oauth-platform
                  key: kick-client-id
                  optional: true
            - name: KICK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth-platform
                  key: kick-client-secret
                  optional: true
            - name: RESTREAM_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: oauth-platform
                  key: restream-client-id
                  optional: true
            - name: RESTREAM_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth-platform
                  key: restream-client-secret
                  optional: true
            - name: OAUTH_REDIRECT_BASE_URL
              value: "https://stream.dazzle.fm"
            - name: SIDECAR_IMAGE
              value: dazzlefm/agent-streamer-sidecar:main
            - name: R2_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: r2-credentials
                  key: endpoint
            - name: R2_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: r2-credentials
                  key: access_key_id
            - name: R2_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: r2-credentials
                  key: secret_access_key
            - name: R2_BUCKET
              valueFrom:
                secretKeyRef:
                  name: r2-credentials
                  key: bucket
            # Streamer runtime config — any STREAMER_* env var is passed
            # through to streamer pods with the prefix stripped.
            - name: STREAMER_ANGLE_DEFAULT_PLATFORM
              value: opengl
            - name: STREAMER_LIBGL_ALWAYS_SOFTWARE
              value: "1"
            - name: STREAMER_CHROME_FLAGS
              value: >-
                --no-sandbox
                --use-gl=angle --use-angle=default
                --ignore-gpu-blocklist
                --disable-gpu-compositing --disable-gpu-watchdog
                --no-first-run --no-default-browser-check --disable-infobars
                --autoplay-policy=no-user-gesture-required
                --remote-debugging-port=9222 --remote-debugging-address=0.0.0.0
                --user-data-dir=/data/chrome
                --renderer-process-limit=1
                --kiosk --window-size=1280,720 --window-position=0,0
                --display=:99
                --disable-background-timer-throttling
                --disable-backgrounding-occluded-windows
                --disable-renderer-backgrounding
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
