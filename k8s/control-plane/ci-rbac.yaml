---
# CI deploy RBAC — least-privilege access for GitHub Actions via OIDC
# The OIDC subject maps to: github:repo:dazzle-labs/agent-streamer:ref:refs/heads/main
# (prefix "github:" comes from --oidc-username-prefix in kube-apiserver args)

# Namespace-scoped permissions for browser-streamer
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ci-deploy
  namespace: browser-streamer
rules:
  # Core resources applied by kustomize
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps", "serviceaccounts", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Secrets — get required for kubectl apply (diff), but no list/delete.
  # CI decrypts via SOPS and applies; get is per-name only, not enumerable.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]
  # Deployments, StatefulSets, PDBs
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Networking — no delete on NetworkPolicy objects (prevent CI from removing network isolation)
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies", "ingresses"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  # CiliumNetworkPolicy — includes delete because the control-plane Role grants
  # ciliumnetworkpolicies:delete (for dynamic GPU egress policy), and Kubernetes
  # RBAC escalation prevention requires CI to hold all permissions it grants via Roles.
  - apiGroups: ["cilium.io"]
    resources: ["ciliumnetworkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["traefik.io", "traefik.containo.us"]
    resources: ["middlewares", "ingressroutes"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Leases — CI doesn't use these directly, but must hold the permission to
  # grant it via the control-plane Role (RBAC escalation prevention).
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "create", "update"]
  # RBAC within namespace — scoped to known role names only
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
    resourceNames: ["control-plane", "ci-deploy"]
  # Dazzle CRs
  - apiGroups: ["dazzle.fm"]
    resources: ["*"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Monitoring
  - apiGroups: ["monitoring.coreos.com"]
    resources: ["podmonitors", "servicemonitors"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Rollout status / logs
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ci-deploy
  namespace: browser-streamer
subjects:
  - kind: User
    name: "github:repo:dazzle-labs/agent-streamer:ref:refs/heads/main"
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: ci-deploy
  apiGroup: rbac.authorization.k8s.io

---
# Permissions in monitoring namespace (apply-secrets + ci-rbac itself)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ci-deploy
  namespace: monitoring
rules:
  # Secrets — get required for kubectl apply (diff), but no list/delete
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
    resourceNames: ["ci-deploy"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ci-deploy
  namespace: monitoring
subjects:
  - kind: User
    name: "github:repo:dazzle-labs/agent-streamer:ref:refs/heads/main"
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: ci-deploy
  apiGroup: rbac.authorization.k8s.io

---
# Permissions in default namespace (GPU node classes + ci-rbac itself)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ci-deploy
  namespace: default
rules:
  - apiGroups: ["dazzle.fm"]
    resources: ["*"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
    resourceNames: ["ci-deploy"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ci-deploy
  namespace: default
subjects:
  - kind: User
    name: "github:repo:dazzle-labs/agent-streamer:ref:refs/heads/main"
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: ci-deploy
  apiGroup: rbac.authorization.k8s.io

---
# Permissions in kube-system for scheduler-plugins Helm chart
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ci-deploy
  namespace: kube-system
rules:
  - apiGroups: [""]
    resources: ["configmaps", "serviceaccounts", "services"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
    resourceNames: ["ci-deploy", "sched-plugins::extension-apiserver-authentication-reader"]
  # Traefik HelmChartConfig
  - apiGroups: ["helm.cattle.io"]
    resources: ["helmchartconfigs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ci-deploy
  namespace: kube-system
subjects:
  - kind: User
    name: "github:repo:dazzle-labs/agent-streamer:ref:refs/heads/main"
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: ci-deploy
  apiGroup: rbac.authorization.k8s.io

---
# Cluster-scoped permissions
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ci-deploy
rules:
  # CRD management (kubectl apply -f crds/)
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "create", "update", "patch"]
  # Namespace creation (monitoring namespace)
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "create", "update", "patch"]
  # Cluster-scoped scheduling resources
  - apiGroups: ["scheduling.k8s.io"]
    resources: ["priorityclasses"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Scheduler-plugins ClusterRoles/Bindings — scoped to named resources only
  # (resourceNames doesn't restrict 'create', but blocks modify/delete of other ClusterRoles)
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["clusterroles", "clusterrolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
    resourceNames: ["scheduler-plugins-controller", "scheduler-plugins-scheduler", "scheduler-plugins-metrics-reader", "ci-deploy", "control-plane-crds"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ci-deploy
subjects:
  - kind: User
    name: "github:repo:dazzle-labs/agent-streamer:ref:refs/heads/main"
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: ci-deploy
  apiGroup: rbac.authorization.k8s.io
