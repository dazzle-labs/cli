apiVersion: v1
kind: Pod
metadata:
  name: bench
  namespace: browser-streamer
spec:
  restartPolicy: Never
  terminationGracePeriodSeconds: 10
  imagePullSecrets:
    - name: dazzlefm-dockerhub-secret
  containers:
    # Streamer: Xvfb + Chrome + PulseAudio
    - name: streamer
      image: dazzlefm/agent-streamer-stage:main
      imagePullPolicy: IfNotPresent
      env:
        - name: STAGE_ID
          value: bench
        - name: USER_ID
          value: bench
        - name: ANGLE_DEFAULT_PLATFORM
          value: opengl
        - name: LIBGL_ALWAYS_SOFTWARE
          value: "1"
        - name: CHROME_FLAGS
          value: >-
            --no-sandbox
            --use-gl=angle --use-angle=default
            --ignore-gpu-blocklist
            --disable-gpu-compositing --disable-gpu-watchdog
            --no-first-run --no-default-browser-check --disable-infobars
            --autoplay-policy=no-user-gesture-required
            --remote-debugging-port=9222 --remote-debugging-address=0.0.0.0
            --user-data-dir=/data/chrome
            --renderer-process-limit=1
            --kiosk --window-size=1280,720 --window-position=0,0
            --display=:99
            --disable-background-timer-throttling
            --disable-backgrounding-occluded-windows
            --disable-renderer-backgrounding
      resources:
        requests:
          cpu: 500m
          memory: 2Gi
        limits:
          cpu: 3500m
          memory: 14Gi
      volumeMounts:
        - name: dshm
          mountPath: /dev/shm
        - name: stage-data
          mountPath: /data
        - name: hls-data
          mountPath: /tmp/hls
        - name: x11-socket
          mountPath: /tmp/.X11-unix
        - name: pulse-socket
          mountPath: /tmp/pulse
    # Sidecar: serves content + runs bench
    - name: sidecar
      image: dazzlefm/agent-streamer-sidecar:main
      imagePullPolicy: IfNotPresent
      # Start with serve so Chrome can connect to sidecar health endpoint,
      # then we exec in to run bench.
      command: ["/sidecar", "serve"]
      env:
        - name: STAGE_ID
          value: bench
        - name: USER_ID
          value: bench
        - name: DISPLAY
          value: ":99"
        - name: PULSE_SERVER
          value: unix:/tmp/pulse/native
        - name: SCREEN_WIDTH
          value: "1280"
        - name: SCREEN_HEIGHT
          value: "720"
      volumeMounts:
        - name: stage-data
          mountPath: /data
        - name: hls-data
          mountPath: /tmp/hls
        - name: x11-socket
          mountPath: /tmp/.X11-unix
        - name: pulse-socket
          mountPath: /tmp/pulse
      resources:
        requests:
          cpu: 500m
          memory: 512Mi
        limits:
          cpu: 2000m
          memory: 1Gi
  volumes:
    - name: dshm
      emptyDir:
        medium: Memory
        sizeLimit: 2Gi
    - name: stage-data
      emptyDir:
        sizeLimit: 2Gi
    - name: hls-data
      emptyDir:
        sizeLimit: 512Mi
    - name: x11-socket
      emptyDir: {}
    - name: pulse-socket
      emptyDir: {}
