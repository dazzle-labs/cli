apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingest
  namespace: browser-streamer
  labels:
    app: ingest
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: ingest
  template:
    metadata:
      labels:
        app: ingest
    spec:
      imagePullSecrets:
        - name: dazzlefm-dockerhub-secret
      terminationGracePeriodSeconds: 120
      containers:
        - name: nginx-rtmp
          image: dazzlefm/agent-streamer-ingest:latest
          ports:
            - containerPort: 1935
              name: rtmp
              protocol: TCP
            - containerPort: 8080
              name: http
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "2"
              memory: 1Gi
          volumeMounts:
            - name: hls-data
              mountPath: /tmp/hls
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
      volumes:
        - name: hls-data
          emptyDir: {}
        - name: nginx-config
          configMap:
            name: ingest-nginx-config
