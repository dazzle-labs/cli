apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: browserless
  namespace: browser-streamer
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: browserless
  minReplicas: 1
  maxReplicas: 6
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Pods
          value: 2
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 120
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
