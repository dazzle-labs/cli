apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: streamer-priority
value: 1000
globalDefault: false
description: "Priority for streamer stage pods — preempts placeholder pods"
---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: placeholder-priority
value: -1
globalDefault: false
preemptionPolicy: Never
description: "Low priority for placeholder pods — preempted by streamer pods"
