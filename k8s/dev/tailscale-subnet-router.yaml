---
# Tailscale subnet router — advertises the k3s service CIDR to the tailnet.
# Deployed once during bootstrap (not per-namespace).
# Tailnet users can reach any ClusterIP directly, including Traefik.
#
# Prerequisites:
#   1. Create a Tailscale auth key (reusable + ephemeral) at https://login.tailscale.com/admin/settings/keys
#   2. Store it as k8s/secrets-dev/tailscale-auth.secrets.yaml (see setup docs)
#   3. Approve the subnet routes in Tailscale admin after first deploy
#   4. Configure split DNS: *.dev.dazzle.fm → Traefik's ClusterIP (get via kubectl get svc -n kube-system traefik)

apiVersion: v1
kind: Namespace
metadata:
  name: tailscale

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tailscale-subnet-router
  namespace: tailscale

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tailscale-subnet-router
  namespace: tailscale
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tailscale-subnet-router
  namespace: tailscale
subjects:
  - kind: ServiceAccount
    name: tailscale-subnet-router
    namespace: tailscale
roleRef:
  kind: Role
  name: tailscale-subnet-router
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tailscale-subnet-router
  namespace: tailscale
  labels:
    app: tailscale-subnet-router
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tailscale-subnet-router
  template:
    metadata:
      labels:
        app: tailscale-subnet-router
    spec:
      serviceAccountName: tailscale-subnet-router
      containers:
        - name: tailscale
          image: tailscale/tailscale:v1.94.2
          env:
            - name: TS_AUTHKEY
              valueFrom:
                secretKeyRef:
                  name: tailscale-auth
                  key: auth-key
            # Only advertise the Traefik LB ClusterIP, not the entire service CIDR.
            # Get the actual IP: kubectl get svc -n kube-system traefik -o jsonpath='{.spec.clusterIP}'
            # Update the /32 below to match.
            - name: TS_EXTRA_ARGS
              value: "--advertise-routes=10.43.0.0/16 --accept-dns=false --hostname=dev-cluster-router"
            - name: TS_KUBE_SECRET
              value: "tailscale-state"
            - name: TS_USERSPACE
              value: "true"
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
