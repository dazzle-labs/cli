apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Namespace is set dynamically by CI:
#   cd k8s/dev && kustomize edit set namespace dev-pr-<N>

resources:
  - ../namespace.yaml
  - ../infrastructure/postgres.yaml
  - ../control-plane/rbac.yaml
  - ../control-plane/deployment.yaml
  - ../control-plane/service.yaml
  - ../control-plane/swiftshader-configmap.yaml
  - ../ingest/configmap.yaml
  - ../ingest/deployment.yaml
  - ../ingest/service.yaml
  - ingress.yaml
  - resource-quota.yaml
  - limit-range.yaml
  - network-policy.yaml

images:
  - name: dazzlefm/agent-streamer-control-plane
    newTag: dev
  - name: dazzlefm/agent-streamer-stage
    newTag: dev
  - name: dazzlefm/agent-streamer-sidecar
    newTag: dev
  - name: dazzlefm/agent-streamer-ingest
    newTag: dev

patches:
  # Shrink postgres PVC for dev (1Gi instead of 5Gi)
  - target:
      kind: StatefulSet
      name: postgres
    patch: |
      apiVersion: apps/v1
      kind: StatefulSet
      metadata:
        name: postgres
      spec:
        volumeClaimTemplates:
          - metadata:
              name: postgres-data
            spec:
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 1Gi

  # Dev environment overrides for control-plane
  - target:
      kind: Deployment
      name: control-plane
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: control-plane
      spec:
        template:
          spec:
            containers:
              - name: control-plane
                env:
                  - name: ENVIRONMENT
                    value: "dev"
                  - name: MAX_SESSIONS
                    value: "1"
                  - name: SCHEDULER_NAME
                    value: ""
                  - name: PRIORITY_CLASS_NAME
                    value: ""
                  - name: STREAMER_IMAGE
                    value: "dazzlefm/agent-streamer-stage:dev"
                  - name: SIDECAR_IMAGE
                    value: "dazzlefm/agent-streamer-sidecar:dev"
                  - name: RUNPOD_RAW_SECRETS
                    value: "true"
                resources:
                  requests:
                    cpu: 50m
                    memory: 96Mi
                  limits:
                    cpu: 250m
                    memory: 192Mi
