---
# Default deny all ingress/egress, then allow only what's needed.
# Applied per dev-pr-* namespace.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
# Allow pods within the same namespace to talk to each other
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-same-namespace
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
  egress:
    - to:
        - podSelector: {}

---
# Allow DNS resolution (kube-dns in kube-system)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

---
# Allow ingress from Traefik (kube-system) to control-plane
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-traefik-ingress
spec:
  podSelector:
    matchLabels:
      app: control-plane
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: TCP
          port: 8080

---
# Allow control-plane egress to external services (Docker Hub, Clerk, R2, RunPod, RTMP)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-control-plane-egress
spec:
  podSelector:
    matchLabels:
      app: control-plane
  policyTypes:
    - Egress
  egress:
    # Allow all external egress (control-plane needs Docker Hub, Clerk, R2, RunPod, etc.)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              # Block access to other namespaces' pod CIDRs — only same-namespace is allowed above
              - 10.42.0.0/16
