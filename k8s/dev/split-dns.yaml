---
# CoreDNS instance for Tailscale split DNS.
# Resolves *.dev.dazzle.fm → Traefik ClusterIP.
# Tailscale split DNS points dev.dazzle.fm queries at this service's ClusterIP.

apiVersion: v1
kind: ConfigMap
metadata:
  name: split-dns-corefile
  namespace: tailscale
data:
  Corefile: |
    dev.dazzle.fm:53 {
      template IN A {
        answer "{{ .Name }} 60 IN A 10.43.184.246"
      }
      template IN AAAA {
        rcode NOERROR
      }
      log
      errors
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: split-dns
  namespace: tailscale
  labels:
    app: split-dns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: split-dns
  template:
    metadata:
      labels:
        app: split-dns
    spec:
      containers:
        - name: coredns
          image: coredns/coredns:1.12.1
          args: ["-conf", "/etc/coredns/Corefile"]
          ports:
            - containerPort: 53
              protocol: UDP
            - containerPort: 53
              protocol: TCP
          volumeMounts:
            - name: corefile
              mountPath: /etc/coredns
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              add: ["NET_BIND_SERVICE"]
              drop: ["ALL"]
      volumes:
        - name: corefile
          configMap:
            name: split-dns-corefile

---
apiVersion: v1
kind: Service
metadata:
  name: split-dns
  namespace: tailscale
spec:
  selector:
    app: split-dns
  ports:
    - name: dns-udp
      port: 53
      protocol: UDP
    - name: dns-tcp
      port: 53
      protocol: TCP
