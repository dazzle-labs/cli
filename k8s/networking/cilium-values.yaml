operator:
  replicas: 1
  nodeSelector:
    node-role.kubernetes.io/control-plane: "true"

encryption:
  enabled: true
  type: wireguard

k8sServiceHost: 10.255.0.101
k8sServicePort: 6443

kubeProxyReplacement: true

ipam:
  mode: kubernetes

routingMode: tunnel
tunnelProtocol: vxlan

# Use the private Hetzner network interface for tunnel and node-to-node traffic.
# eth0 is the public interface; eth1 is the private network where all node
# InternalIPs (10.x.x.x) live. Without this, Cilium defaults to eth0 and
# VXLAN packets to private IPs get dropped.
devices: "eth+"
