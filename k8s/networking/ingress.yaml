apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: control-plane
  namespace: browser-streamer
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: browser-streamer-cloudflare-only@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - dazzle.fm
      secretName: dazzle-fm-tls
  rules:
    - host: dazzle.fm
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: control-plane
                port:
                  number: 8080
