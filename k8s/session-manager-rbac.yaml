apiVersion: v1
kind: ServiceAccount
metadata:
  name: session-manager
  namespace: browser-streamer
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: session-manager
  namespace: browser-streamer
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "delete", "get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: session-manager
  namespace: browser-streamer
subjects:
  - kind: ServiceAccount
    name: session-manager
    namespace: browser-streamer
roleRef:
  kind: Role
  name: session-manager
  apiGroup: rbac.authorization.k8s.io
