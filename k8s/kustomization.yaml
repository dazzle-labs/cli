apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - infrastructure/postgres.yaml
  - infrastructure/redis.yaml
  - infrastructure/pdb.yaml
  - control-plane/rbac.yaml
  - control-plane/ci-rbac.yaml
  - control-plane/deployment.yaml
  - control-plane/swiftshader-configmap.yaml
  - control-plane/service.yaml
  - control-plane/pdb.yaml
  - control-plane/network-policy.yaml
  - ingest/configmap.yaml
  - ingest/deployment.yaml
  - ingest/service.yaml
  - ingest/pdb.yaml
  - ingest/network-policy.yaml
  - infrastructure/network-policy.yaml
  - networking/default-deny.yaml
  - networking/stage-runtime-network-policy.yaml
  - networking/ingress.yaml
  - networking/cloudflare-middleware.yaml
  - networking/traefik-config.yaml
  - monitoring/stage-runtime-podmonitor.yaml
  - scheduling/priority-classes.yaml
  - scheduling/placeholder.yaml
  - scheduling/trimaran/metrics-rbac.yaml
  - gpu/rtx5090.yaml
  - gpu/rtx4090.yaml
  - gpu/rtx-pro-6000.yaml
  - gpu/l40s.yaml
  - gpu/a40.yaml

helmCharts:
  - name: scheduler-plugins
    repo: https://scheduler-plugins.sigs.k8s.io
    namespace: kube-system
    releaseName: trimaran
    valuesFile: scheduling/trimaran/values.yaml
